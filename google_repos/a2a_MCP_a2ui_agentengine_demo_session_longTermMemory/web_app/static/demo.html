      if (body) body.innerHTML = panelKPIs() + tileHTML(false);

    /* 3 KPI tiles — only after the audience is sized (Estimate size or Scale it up).
       If not scaled, ProScore expansion shows "--". */
    function panelKPIs() {
      if (!A || !(A.scaled || A.estimated)) return '';
      const seed = fmt(A.seed);
      const prob = A.scaled && A.complete ? A.complete.prob.replace(/M$/, '<small>M</small>') : '--';
      const total = A.scaled && A.complete ? A.complete.total.replace(/M$/, '<small>M</small>') : seed;
      return `<div class="panel-kpis"><div class="kpi-row cols-3">
    <div class="kpi"><div class="kpi-label">Verified seed</div><div class="kpi-value det">${seed}</div><div class="kpi-sub">deterministic panel HH</div></div>

  </div></div>`;
    }
    /* One symmetric toggle: Pin (inline) ↔ Unpin (panel) */
    function togglePin() {
      if (!A) return;

    function pinDefinition() {

            const bc = el('div', 'msg-agent', '<div class="pin-breadcrumb">Definition pinned →</div>');

        appendMessage(el('div', 'msg-agent', '<div class="pin-breadcrumb">Definition pinned →</div>'));

      syncPanel();
      appendNextSteps();
      scrollToBottom();

    function unpinDefinition() {
      document.body.classList.remove('pinned');
      const main = document.querySelector('.main'), panel = document.querySelector('.aud-panel');
      if (main) main.style.flexGrow = ''; if (panel) panel.style.flexGrow = '';
      const body = document.getElementById('audPanelBody'); if (body) body.innerHTML = '';
      renderTile();            // re-render inline at the bottom with latest state
      scrollToBottom();
    }
    function resetLayout() {
      try { localStorage.removeItem('la_pinned'); localStorage.removeItem('la_pin_coach'); } catch (e) { }
      if (pinned) { pinned = false; unpinDefinition(); }
      closeSettings && closeSettings();
    }
    /* one-time coachmark on the (inline) pin button */
    function maybeShowPinCoach() {
      let seen = false; try { seen = localStorage.getItem('la_pin_coach') === '1'; } catch (e) { }
      if (seen || pinned) return;
      setTimeout(() => {
        const btn = [...document.querySelectorAll('#convoInner .pin-btn')].pop();
        if (!btn || document.getElementById('pinCoach')) return;
        const r = btn.getBoundingClientRect();
        const c = el('div', 'pin-coach', 'Pin this to keep it open while you edit<span class="pc-dismiss" onclick="dismissPinCoach()">Got it</span>');
        c.id = 'pinCoach';
        document.body.appendChild(c);
        c.style.top = (r.bottom + 10) + 'px';
        c.style.left = Math.max(12, (r.right - c.offsetWidth)) + 'px';
      }, 500);
    }
    function dismissPinCoach() {
      const c = document.getElementById('pinCoach'); if (c) c.remove();
      try { localStorage.setItem('la_pin_coach', '1'); } catch (e) { }
    }

    /* Builds the editable Audience tile markup (full or collapsed) */
    function tileHTML(collapsed) {
      const sm = statusMeta();
      const productPill = A.product
        ? pill('scope-product', A.product, `Edit product scope — change "${A.product}" to `, `removePill(this,'product','')`) + addBtn(`prefillComposer('Add a product — ')`)
        : addBtn(`prefillComposer('Set the product scope — ')`, true);
      const timePill = A.time
        ? pill('scope-time', A.time, `Widen the window — prior ${A.priorWeeks}w → `, `removePill(this,'time','')`) + addBtn(`prefillComposer('Add a time period — ')`)
        : addBtn(`prefillComposer('Set the time period — ')`, true);
      const measurePills = A.measures.length
        ? A.measures.map(m => pill('measure', m, `Edit measure — ${m} → `, `removePill(this,'measure','${esc(m)}')`, `editMeasureFlow('${esc(m)}')`)).join('')
        : `<button class="pill measure missing" onclick="addMeasureFlow()">Add a measure</button>`;
      const attrPills = A.attributes.map(a => pill('attribute', a, `Edit attribute — ${a} → `, `removePill(this,'attribute','${esc(a)}')`)).join('')
        + addBtn(`prefillComposer('Add an attribute — ')`);
      const destPills = A.destinations.length
        ? A.destinations.map(d => pill('dest', d, `Edit destinations — change ${d} to `, `removePill(this,'dest','${esc(d)}')`, `doSelectDestinations('Edit destination')`)).join('') + addBtn(`doSelectDestinations()`)
        : addBtn(`doSelectDestinations()`, true);
      const defPrefill = `Change the definition — ${A.definition} → `;
      const hasSeed = A.status !== 'incomplete';
      const resultStrip = hasSeed ? `<div class="aud-result-strip">
      <span>${A.scaled ? ('reach ' + A.complete.total) : ('est. reach ' + fmt(A.seed) + ' HH')}</span><span class="dot"></span>
      <span>${A.profiled ? 'profile ready' : 'profile available'}</span><span class="dot"></span>
      <span>${A.gatesPassed ? 'gates passed ✓' : 'gates pending'}</span></div>` : '';
      return `
    <div class="aud-tile">
      <div class="aud-tile-head">
        <div class="aud-tile-title">${A.name}</div>
        <div class="aud-tile-head-right">
          ${collapsed
          ? `<button class="aud-collapse-toggle" onclick="toggleTileBody(this)"><span class="lbl">View audience definition</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg></button>`
          : `<span class="aud-tile-hint">tap a pill to edit it</span>`}
          <span class="aud-status ${sm.cls}">${sm.label}</span>
          <button class="pin-btn${pinned ? ' active' : ''}" onclick="togglePin()" title="${pinned ? 'Unpin — back to chat' : 'Pin to the side — keep this open while you edit'}" aria-label="${pinned ? 'Unpin' : 'Pin'}">${DOCK_GLYPH}</button>
        </div>
      </div>
      <div class="aud-collapse"${collapsed ? ' style="display:none"' : ''}>
      <div class="aud-tile-body">
        <div class="aud-grp"><div class="aud-grp-label">Type</div><div class="aud-pills">${pill('type', typePillText(), defPrefill, null, 'editTypeFlow()')}</div></div>
        <div class="aud-grp"><div class="aud-grp-label">Scope (Product)</div><div class="aud-pills">${productPill}</div></div>
        <div class="aud-grp"><div class="aud-grp-label">Scope (Time)</div><div class="aud-pills">${timePill}</div></div>
        <div class="aud-grp"><div class="aud-grp-label">Measures</div><div class="aud-pills">${measurePills}</div></div>
        <div class="aud-grp"><div class="aud-grp-label">Attributes</div><div class="aud-pills">${attrPills}</div></div>
        <div class="aud-grp"><div class="aud-grp-label">Destinations</div><div class="aud-pills">${destPills}</div></div>
        ${resultStrip}
        <div style="padding:6px 0 2px">
          <div class="expand-row" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg> View full audience details
          </div>
          <div class="expand-body">${detailsTable()}</div>
        </div>
      </div>
      </div>
    </div>`;
    }

    /* Standalone "Recommended next steps" row (Make edits is always present and
       gives on-demand access to the editable definition). */
    /* Keep only ONE live action chip-row at a time. Every "what next" row uses
       .followup-section; remove existing ones before showing the latest so stale
       actions (e.g. "Scale it up" after scaling) can't be clicked. Substantive
       content (prompts, KPI cards, builder cards) is untouched. */
    function pruneActionRows() {
      document.querySelectorAll('#convoInner .followup-section').forEach(n => {
        if (n.dataset.removing) return;
        const msg = n.closest('.msg-agent');
        // collapse the whole message wrapper if it only holds this row (standalone),
        // otherwise just the row (e.g. chips inside an inline tile message)
        if (msg && msg.children.length === 1) collapseAndRemove(msg, true);
        else collapseAndRemove(n, false);
      });
    }
    /* Fade out + collapse height so content below glides up to fill the void.
       isFlexItem rows sit in the gap:20px column, so we pull margin to -20px at the
       end to absorb the now-duplicate gap and avoid a snap on removal. */
    function collapseAndRemove(elm, isFlexItem) {
      if (elm.dataset.removing) return; elm.dataset.removing = '1';
      const h = elm.offsetHeight;
      elm.style.overflow = 'hidden';
      elm.style.height = h + 'px';
      void elm.offsetHeight;                       // commit start frame
      elm.style.transition = 'height .45s cubic-bezier(.4,0,.2,1), opacity .3s ease, margin .45s cubic-bezier(.4,0,.2,1), padding .45s cubic-bezier(.4,0,.2,1)';
      requestAnimationFrame(() => {
        elm.style.height = '0px';
        elm.style.opacity = '0';
        elm.style.paddingTop = '0'; elm.style.paddingBottom = '0'; elm.style.marginTop = '0';
        elm.style.marginBottom = isFlexItem ? '-20px' : '0';
      });
      setTimeout(() => { if (elm.parentNode) elm.remove(); }, 480);
    }
    function appendNextSteps() {
      pruneActionRows();
      appendMessage(el('div', 'msg-agent', `<div class="followup-section"><div class="followup-label">Recommended next steps</div><div class="chip-row">${chipsFor(A.status)}</div></div>`));
      syncPanel();
    }
    function toggleTileBody(btn) {
      const tile = btn.closest('.aud-tile');
      const box = tile.querySelector('.aud-collapse');
      const open = box.style.display !== 'none';
      box.style.display = open ? 'none' : 'block';
      btn.classList.toggle('open', !open);
      btn.querySelector('.lbl').textContent = open ? 'View audience definition' : 'Hide audience definition';
    }

    function detailsTable() {
      return `<div class="dtable">
    <div class="drow"><div class="drow-label">Details</div><div class="drow-value"><div>Purpose: ${A.purpose}</div><div>Refresh: ${A.refresh}</div></div></div>
    <div class="drow"><div class="drow-label">Type</div><div class="drow-value"><div>${A.type}${A.scaled ? ' (Verified seed + ProScore expansion → Complete)' : ''}</div><div>Definition: ${A.definition}</div></div></div>
    <div class="drow"><div class="drow-label">Scope</div><div class="drow-value"><div>Products: ${A.product || '—'}</div><div>Time: ${A.time || '—'}</div></div></div>
    <div class="drow"><div class="drow-label">Measures</div><div class="drow-value">${A.measures.join(', ') || '—'}</div></div>
    <div class="drow"><div class="drow-label">Attributes</div><div class="drow-value">${A.attributes.join(', ') || '—'}</div></div>
    <div class="drow"><div class="drow-label">Activation</div><div class="drow-value">${A.destinations.join(', ') || '—'}</div></div>
    <div class="drow"><div class="drow-label">Envelope</div><div class="drow-value"><div>Status: ${A.status} · ${A.scaled ? ('Complete ' + A.complete.total) : (fmt(A.seed) + ' HH seed')}</div><div>Compliance: ${A.gatesPassed ? 'all gates passed ✓' : 'pending'}</div></div></div>
  </div>`;
    }

    /* state-driven follow-up chips */
    function chip(action, label, cls, disabled) {
      if (disabled) return `<button class="chip ${cls || ''} disabled" disabled>${label}</button>`;
      return `<button class="chip ${cls || ''}" onclick="${action}">${label}</button>`;
    }
    function moreChip() {
      return `<button class="chip chip-more" onclick="expandMoreChip(this)" title="More"><span class="more-dots"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.7"/><circle cx="12" cy="12" r="1.7"/><circle cx="19" cy="12" r="1.7"/></svg></span><span class="more-open">Open in app <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h6"/></svg></span></button>`;
    }
    function expandMoreChip(btn) {
      if (!btn.classList.contains('open')) btn.classList.add('open');
      else agentNote('Opening this audience in the Liquid Activate app…');
    }
    function showDefinition() { if (A) renderTile(); }
    function chipsFor(status, inTile) {
      let chips;
      const critOk = !!(A && A.product && A.time && A.definition && A.destinations.length);
      switch (status) {
        case 'incomplete': chips = [
          chip(`prefillComposer('Set the product scope — ')`, 'Pick a product'),
          chip(`prefillComposer('Set the definition — ')`, 'Choose a definition'),
          chip(`prefillComposer('Set the time period — ')`, 'Set the time period')
        ]; break;
        case 'built': chips = [
          chip('doScale(true)', 'Scale it up'),
          A.profiled ? '' : chip('doProfile()', 'Profile it'),
          A.estimated ? '' : chip('doEstimate()', 'Estimate size', '', !critOk),
          chip('doSelectDestinations()', 'Select destinations'),
          chip('doActivate()', ROCKET + 'Activate', 'go-chip', !critOk)
        ]; break;
        case 'scaled': chips = [
          A.profiled ? '' : chip('doProfile()', 'Profile it'),
          A.estimated ? '' : chip('doEstimate()', 'Estimate size', '', !critOk),
          chip('doSelectDestinations()', 'Select destinations'),
          chip('doActivate()', ROCKET + 'Activate', 'go-chip', !critOk)
        ]; break;
        case 'ready': chips = [
          chip('doActivate()', ROCKET + 'Activate', 'go-chip', !critOk),
          A.estimated ? '' : chip('doEstimate()', 'Estimate size', '', !critOk),
          chip('doSelectDestinations()', 'Add a destination')
        ]; break;
        case 'activated': chips = [
          chip('doLiftStudy()', 'Set up a lift study', 'activate-chip'),
          chip(`agentNote('Duplicating this audience for another brand — pick a brand to clone the definition onto.')`, 'Duplicate for a brand'),
          chip(`agentNote('Scheduled a monthly refresh on day 1. The audience will rebuild and re-gate automatically.')`, 'Schedule a refresh'),
          chip('resetConversation()', 'Build another')
        ]; break;
        default: return '';
      }
      if (!inTile && !pinned) chips.push(chip('showDefinition()', 'Make edits'));
      // while the chain is paused before sizing, the confirm chip leads the row
      if (pilot && pilot.awaitSize) chips.unshift(chip('pilotSize()', 'Yes, size it', 'confirm'));
      return chips.join('') + moreChip();
    }

    /* ============================================================
       EDIT — widen window (selective re-execution: rebuild)
       ============================================================ */
    function doWiden() {
      streamSteps('Applying edit…', ['Re-resolving the time window → prior 26 wks…', 'Rebuilding verified seed via Liquid Data…', A.scaled ? 'Re-scaling ProScore expansion…' : null].filter(Boolean), () => {
        A.priorWeeks = 26; A.time = 'Prior 26 weeks'; A.version++;
        A.seed = 31200;
        if (A.scaled) { A.complete = { det: fmt(A.seed), prob: '29M', total: '29M' }; }
        A.gatesPassed = false;
        agentNote('Updated → <b>Lapsed · prior 26w</b> · reseeded to <b>' + fmt(A.seed) + ' HH</b>. Widening the window pulls in more recently-lapsed households.');
        renderTile();
      });
    }
    function doGenericEdit(t) {
      // catch-all: acknowledge as a definitional edit and rebuild
      streamSteps('Applying edit…', ['Interpreting the change…', 'Updating the Audience object…', 'Re-running affected steps…'], () => {
        A.version++;
        agentNote('Applied your change and re-ran only the affected steps. Here is the updated audience.');
        renderTile();
      });
    }

    /* ============================================================
       PROFILE  (ported demographic profile)
       ============================================================ */
    function doProfile() {
      if (!firstTurn) return;
      A.profiled = true;
      addUserMsg('Profile the audience');
      renderDemographicProfile();
      syncPanel();
    }

    /* ============================================================
       SCALE → Complete
       ============================================================ */
    function doScale(addKids) {
      const steps = ['Building ProScore probabilistic model…', 'Merging ProScore build with verified seed → Complete…', addKids ? 'Adding attribute → households with children…' : null, 'Re-running quality &amp; overlap checks…'].filter(Boolean);
      streamSteps('Scaling…', steps, () => {
        A.scaled = true; A.type = 'Complete'; A.status = 'scaled'; A.version++;
        A.complete = { det: fmt(A.seed), prob: '28M', total: '28M' };
        if (addKids && !A.attributes.includes('Households with kids')) A.attributes.push('Households with kids');
        renderScaledResult();
        appendNextSteps();
      });
    }
    function renderScaledResult() {
      const probM = A.complete.prob.replace(/M$/, '<small>M</small>');
      const totalM = A.complete.total.replace(/M$/, '<small>M</small>');
      const wrap = el('div', 'msg-agent');
      wrap.innerHTML = `
    <div class="panel">
      <div class="panel-lead">Scaled to a Complete audience.</div>
      <div class="kpi-row cols-3">
        <div class="kpi"><div class="kpi-label">Verified seed</div><div class="kpi-value det" data-count="${A.seed}">0</div><div class="kpi-sub">deterministic panel HH</div></div>
        <div class="kpi"><div class="kpi-label">ProScore expansion</div><div class="kpi-value prob">${probM}</div><div class="kpi-sub">probabilistic lookalikes</div></div>
        <div class="kpi"><div class="kpi-label">Total reach</div><div class="kpi-value total">${totalM}</div><div class="kpi-sub">Complete · activation-ready</div></div>
      </div>
      <div class="panel-line">Seed of <b>${fmt(A.seed)}</b> verified lapsed ${A.product || 'CSD'} households expanded via ProScore to <b>${A.complete.total}</b> behaviorally similar US shoppers.</div>
      <div class="banner success"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5l3 3 6-7"/></svg>Complete = merge. Scaling merges the ProScore build with the verified seed; the seed itself is left untouched.</div>
    </div>`;
      appendMessage(wrap);
      animateCounts(wrap);
    }

    /* ============================================================
       ESTIMATE SIZE (counts only — its own branch)
       ============================================================ */
    function doEstimate() {
      if (!firstTurn) { return; }
      if (pilot && pilot.awaitSize) { pilotSize('Estimate the size.'); return; }
      pruneActionRows();
      A.estimated = true;
      addUserMsg('Estimate the size');
      streamSteps('Estimating…', ['Counting matched households…', 'Skipping activation (estimate only)…'], () => {
        const total = A.scaled && A.complete ? A.complete.total : fmt(A.seed) + ' HH';
        const wrap = el('div', 'msg-agent');
        wrap.innerHTML = `
      <div class="panel">
        <div class="panel-lead">Estimated size — counts only, nothing distributed.</div>
        <div class="kpi-row cols-1"><div class="kpi"><div class="kpi-label">${A.scaled ? 'Total reach' : 'Verified seed'}</div><div class="kpi-value">${total}</div><div class="kpi-sub">${A.scaled ? 'Complete · probabilistic + deterministic' : 'deterministic panel households'}</div></div></div>
        <div class="banner amber"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="8" cy="8" r="6.5"/><path d="M8 5v3.5M8 11h.01"/></svg>This was an estimate-size request, so I stopped after the counts and did not run activation.</div>
      </div>
      <div class="followup-section"><div class="followup-label">Recommended next steps</div><div class="chip-row">
        ${chip('doActivate()', ROCKET + 'Activate it instead', 'go-chip')}
        ${chip('doSelectDestinations()', 'Select destinations')}
        ${chip(`prefillComposer('Refine the definition — ${A.definition} → ')`, 'Refine the definition')}
        ${chip('showDefinition()', 'Make edits')}
        ${moreChip()}
      </div></div>`;
        appendMessage(wrap);
        syncPanel();
      });
    }

    /* ============================================================
       MEASURE BUILDER
       ============================================================ */
    function measureCardHTML(preset, editOf) {
      const measures = ['Dollars', 'Units', 'Unit Price', 'Trips'];
      const ops = [['gt', 'Greater Than'], ['lt', 'Less Than'], ['eq', 'Equal To'], ['ne', 'Not Equal'], ['bt', 'Between']];
      const ps = preset || {};
      const money = (ps.measure === 'Dollars' || ps.measure === 'Unit Price');
      const between = ps.op === 'bt';
      const ok = ps.measure && ps.op && ps.v1 != null && ps.v1 !== '' && (!between || (ps.v2 != null && ps.v2 !== ''));
      return `
    <div class="panel" data-edit-of="${editOf || ''}">
      <div class="panel-lead">${editOf ? 'Edit this measure.' : 'Add a measure to the audience.'}</div>
      <div class="mb-section">
        <div class="mb-label">Measure</div>
        <div class="mb-grid">${measures.map(m => `<button class="mb-chip mb-measure${ps.measure === m ? ' selected' : ''}" data-m="${m}" onclick="mbPick(this,'measure')">${m}</button>`).join('')}</div>
      </div>
      <div class="mb-section">
        <div class="mb-label">Operator</div>
        <div class="mb-grid">${ops.map(o => `<button class="mb-chip mb-op${ps.op === o[0] ? ' selected' : ''}" data-op="${o[0]}" onclick="mbPick(this,'op')">${o[1]}</button>`).join('')}</div>
      </div>
      <div class="mb-section">
        <div class="mb-label">Value</div>
        <div class="mb-values">
          <span class="mb-field"><span class="mb-prefix" style="display:${money ? '' : 'none'}">$</span><input class="mb-v1" type="number" placeholder="value" value="${ps.v1 != null ? ps.v1 : ''}" oninput="mbSync(this.closest('.panel'))"></span>
          <span class="mb-and" style="display:${between ? '' : 'none'}">and</span>
          <span class="mb-field mb-field2" style="display:${between ? '' : 'none'}"><span class="mb-prefix" style="display:${money ? '' : 'none'}">$</span><input class="mb-v2" type="number" placeholder="value" value="${ps.v2 != null ? ps.v2 : ''}" oninput="mbSync(this.closest('.panel'))"></span>
        </div>
      </div>
      <div class="aud-actions" style="border-top:none;padding:14px 0 0">
        <button class="btn primary mb-add" onclick="commitMeasure(this)"${ok ? '' : ' disabled'}>${editOf ? 'Save measure' : 'Add measure'}</button>
        <button class="btn ghost" onclick="showDefinition()">Cancel</button>
      </div>
    </div>`;
    }
    function addMeasureFlow() {
      if (!firstTurn) return;
      addUserMsg('Add a measure');
      appendMessage(el('div', 'msg-agent', measureCardHTML(null, null)));
    }
    function parseMeasure(str) {
      const sm = v => String(v).replace(/^\$/, '').trim();
      let m = str.match(/^(.+?) between (.+?) and (.+)$/);
      if (m) return { measure: m[1], op: 'bt', v1: sm(m[2]), v2: sm(m[3]) };
      m = str.match(/^(.+?) ([><=≠]) (.+)$/);
      if (m) { const map = { '>': 'gt', '<': 'lt', '=': 'eq', '≠': 'ne' }; return { measure: m[1], op: map[m[2]] || 'gt', v1: sm(m[3]), v2: '' }; }
      return { measure: str, op: null, v1: '', v2: '' };
    }
    function editMeasureFlow(measureStr) {
      if (!firstTurn) return;
      const ps = parseMeasure(measureStr);
      addUserMsg('Edit ' + ps.measure + ' measure');
      appendMessage(el('div', 'msg-agent', measureCardHTML(ps, measureStr)));
    }
    function mbPick(elx, kind) {
      const panel = elx.closest('.panel');
      const cls = kind === 'measure' ? 'mb-measure' : 'mb-op';
      panel.querySelectorAll('.' + cls).forEach(c => c.classList.remove('selected'));
      elx.classList.add('selected');
      if (kind === 'measure') {
        const money = (elx.dataset.m === 'Dollars' || elx.dataset.m === 'Unit Price');
        panel.querySelectorAll('.mb-prefix').forEach(p => p.style.display = money ? '' : 'none');
      }
      if (kind === 'op') {
        const between = elx.dataset.op === 'bt';
        panel.querySelector('.mb-and').style.display = between ? '' : 'none';
        panel.querySelector('.mb-field2').style.display = between ? '' : 'none';
      }
      mbSync(panel);
    }
    function mbSync(panel) {
      const m = panel.querySelector('.mb-measure.selected');
      const op = panel.querySelector('.mb-op.selected');
      const v1 = panel.querySelector('.mb-v1').value.trim();
      const between = op && op.dataset.op === 'bt';
      const v2 = panel.querySelector('.mb-v2').value.trim();
      panel.querySelector('.mb-add').disabled = !(m && op && v1 !== '' && (!between || v2 !== ''));
    }
    function commitMeasure(btn) {
      const panel = btn.closest('.panel');
      const m = panel.querySelector('.mb-measure.selected').dataset.m;
      const op = panel.querySelector('.mb-op.selected').dataset.op;
      const v1 = panel.querySelector('.mb-v1').value.trim();
      const v2 = panel.querySelector('.mb-v2').value.trim();
      const money = (m === 'Dollars' || m === 'Unit Price');
      const fmtV = v => money ? ('$' + v) : v;
      const sym = { gt: '>', lt: '<', eq: '=', ne: '≠' };
      const str = op === 'bt' ? `${m} between ${fmtV(v1)} and ${fmtV(v2)}` : `${m} ${sym[op]} ${fmtV(v1)}`;
      const editOf = panel.dataset.editOf;
      if (editOf) {
        const i = A.measures.indexOf(editOf);
        if (i >= 0) A.measures[i] = str; else A.measures.push(str);
        agentNote('Updated measure → <b>' + str + '</b>. Applied to the audience definition.');
      } else {
        A.measures.push(str);
        agentNote('Added measure → <b>' + str + '</b>. Applied to the audience definition.');
      }
      A.version++;
      afterEdit();
    }

    /* ============================================================
       AUDIENCE TYPE BUILDER
       ============================================================ */
    function editTypeFlow() {

    function buildAgeCurve(audience, baseline, labels) {
      const W = 620, H = 200, padX = 36, padTop = 36, padBottom = 32;
      const innerW = W - padX * 2, innerH = H - padTop - padBottom, n = audience.length, maxY = 30;
      const xs = audience.map((_, i) => padX + (i / (n - 1)) * innerW);
      const toY = v => padTop + innerH - (v / maxY) * innerH;
      const audY = audience.map(toY), baseY = baseline.map(toY);
      function smoothPath(xs, ys, close) {
        let d = `M ${xs[0].toFixed(1)},${ys[0].toFixed(1)}`;
        for (let i = 0; i < xs.length - 1; i++) {
          const x0 = i > 0 ? xs[i - 1] : xs[i], y0 = i > 0 ? ys[i - 1] : ys[i];
          const x1 = xs[i], y1 = ys[i], x2 = xs[i + 1], y2 = ys[i + 1];
          const x3 = i < xs.length - 2 ? xs[i + 2] : xs[i + 1], y3 = i < xs.length - 2 ? ys[i + 2] : ys[i + 1];
          const t = 0.18;
          const cp1x = x1 + (x2 - x0) * t, cp1y = y1 + (y2 - y0) * t, cp2x = x2 - (x3 - x1) * t, cp2y = y2 - (y3 - y1) * t;
          d += ` C ${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${x2.toFixed(1)},${y2.toFixed(1)}`;
        }
        if (close) d += ` L ${xs[xs.length - 1].toFixed(1)},${(padTop + innerH).toFixed(1)} L ${xs[0].toFixed(1)},${(padTop + innerH).toFixed(1)} Z`;
        return d;
      }
      const audPath = smoothPath(xs, audY, false), audFill = smoothPath(xs, audY, true), basePath = smoothPath(xs, baseY, false);
      const peakX = (xs[2] + xs[3]) / 2, peakY = Math.min(audY[2], audY[3]) - 18, xAxisY = padTop + innerH;
      const xLabels = labels.map((lbl, i) => `<text x="${xs[i].toFixed(1)}" y="${xAxisY + 18}" text-anchor="middle" font-size="10" font-family="proxima-nova,sans-serif" fill="var(--t3)">${lbl}</text>`).join('');
      const yLabel = pct => { const y = toY(pct); return `<text x="${padX - 8}" y="${y + 3}" text-anchor="end" font-size="9" font-family="proxima-nova,sans-serif" fill="var(--t4)">${pct}%</text>`; };
      const TOTAL = 28;
      const audDots = xs.map((x, i) => {
        const a = audience[i], b = baseline[i], delta = a - b, sign = delta > 0 ? '+' : '', idx = Math.round((a / b) * 100), filteredReach = (TOTAL * a / 100).toFixed(1);
        const tipBody = `<b>${a}%</b> of audience &middot; <b>idx ${idx}</b><br>${sign}${delta} pts vs US baseline`;
        const refineDetail = `Refining to <b>${labels[i]}</b> only. Estimated reach: <b>${filteredReach}M</b> HHs. ${delta > 0 ? 'Over-indexed bucket — high-yield.' : 'Smaller bucket — best as a refinement filter.'}`;
        return `<g class="age-dot-g" onmouseenter="showTip(event,'Age ${labels[i]}','${tipBody}')" onmousemove="moveTip(event)" onmouseleave="hideTip()" onclick="refineFromViz('Filter to age ${labels[i]}','${refineDetail.replace(/'/g, '&#39;')}')"><circle cx="${x.toFixed(1)}" cy="${audY[i].toFixed(1)}" r="12" fill="transparent"/><circle class="age-dot-visible" cx="${x.toFixed(1)}" cy="${audY[i].toFixed(1)}" r="3.5" fill="var(--activate)" stroke="var(--surface)" stroke-width="1.5"/></g>`;
      }).join('');
      const peakLabels = `<text x="${xs[2].toFixed(1)}" y="${(audY[2] - 9).toFixed(1)}" text-anchor="middle" font-size="11" font-weight="700" font-family="proxima-nova,sans-serif" fill="var(--activate)">24%</text><text x="${xs[3].toFixed(1)}" y="${(audY[3] - 9).toFixed(1)}" text-anchor="middle" font-size="11" font-weight="700" font-family="proxima-nova,sans-serif" fill="var(--activate)">26%</text>`;
      return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Age distribution">
    <line x1="${padX}" y1="${padTop + innerH}" x2="${W - padX}" y2="${padTop + innerH}" stroke="var(--border)" stroke-width="0.5"/>
    <line x1="${padX}" y1="${toY(15).toFixed(1)}" x2="${W - padX}" y2="${toY(15).toFixed(1)}" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="2 4"/>
    <line x1="${padX}" y1="${toY(30).toFixed(1)}" x2="${W - padX}" y2="${toY(30).toFixed(1)}" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="2 4"/>
    ${yLabel(0)}${yLabel(15)}${yLabel(30)}${xLabels}
    <g class="stream-fill-area"><path d="${audFill}" fill="rgba(255,111,0,0.16)"/></g>
    <path d="${basePath}" fill="none" stroke="var(--bh)" stroke-width="1.5" stroke-dasharray="5 3" stroke-linecap="round"/>
    <path class="stream-path" d="${audPath}" fill="none" stroke="var(--activate)" stroke-width="2.5" stroke-linecap="round"/>
    <g class="stream-late">${audDots}${peakLabels}<rect x="${(peakX - 44).toFixed(1)}" y="${(peakY - 12).toFixed(1)}" width="88" height="22" rx="11" fill="var(--activate)"/><text x="${peakX.toFixed(1)}" y="${(peakY + 3).toFixed(1)}" text-anchor="middle" font-size="11" font-family="proxima-nova,sans-serif" font-weight="700" fill="white">+30 vs baseline</text></g>
  </svg>`;
    }

    function buildIncomeDivRow(r) {
      const delta = r.idx - 100, over = delta > 0, widthPct = Math.min(Math.abs(delta) * 2.5, 42), label = (over ? '+' : '') + delta;
      const tipBody = `<b>${r.pct}</b> of audience &middot; <b>idx ${r.idx}</b><br>${over ? 'Over-indexes by ' + delta : 'Under-indexes by ' + Math.abs(delta)} pts vs US`;
      const refineDetail = `Refining to <b>${r.label}</b> households only. ${over ? 'Over-indexes by ' + delta + ' points — concentrate spend here.' : 'Under-indexes — useful as a suppression filter.'}`;
      return `<div class="income-drow" onmouseenter="showTip(event,'${r.label}','${tipBody}')" onmousemove="moveTip(event)" onmouseleave="hideTip()" onclick="refineFromViz('Filter to ${r.label} income','${refineDetail.replace(/'/g, '&#39;')}')"><div class="income-drow-label">${r.label}</div><div class="income-dtrack"><div class="income-dfill ${over ? 'over' : 'under'}" data-target-width="${widthPct}%" style="width:0">${label}</div></div><div class="income-drow-val">${r.pct}</div><div class="income-didx ${over ? 'over' : 'under'}">${r.idx}</div></div>`;
    }

    function buildGeoMap() {
      const states = [{ a: 'ME', c: 10, r: 0, d: 0.22 }, { a: 'WI', c: 5, r: 1, d: 0.42 }, { a: 'VT', c: 9, r: 1, d: 0.18 }, { a: 'NH', c: 10, r: 1, d: 0.18 }, { a: 'WA', c: 0, r: 2, d: 0.30 }, { a: 'ID', c: 1, r: 2, d: 0.18 }, { a: 'MT', c: 2, r: 2, d: 0.16 }, { a: 'ND', c: 3, r: 2, d: 0.20 }, { a: 'MN', c: 4, r: 2, d: 0.40 }, { a: 'MI', c: 6, r: 2, d: 0.52 }, { a: 'NY', c: 9, r: 2, d: 0.38 }, { a: 'MA', c: 10, r: 2, d: 0.28 }, { a: 'OR', c: 0, r: 3, d: 0.32 }, { a: 'NV', c: 1, r: 3, d: 0.32 }, { a: 'WY', c: 2, r: 3, d: 0.16 }, { a: 'SD', c: 3, r: 3, d: 0.22 }, { a: 'IA', c: 4, r: 3, d: 0.50 }, { a: 'IL', c: 5, r: 3, d: 0.78, dma: 'Chicago' }, { a: 'IN', c: 6, r: 3, d: 0.62 }, { a: 'OH', c: 7, r: 3, d: 0.60 }, { a: 'PA', c: 8, r: 3, d: 0.50 }, { a: 'CT', c: 9, r: 3, d: 0.30 }, { a: 'RI', c: 10, r: 3, d: 0.20 }, { a: 'CA', c: 0, r: 4, d: 0.55 }, { a: 'UT', c: 1, r: 4, d: 0.30 }, { a: 'CO', c: 2, r: 4, d: 0.40 }, { a: 'NE', c: 3, r: 4, d: 0.34 }, { a: 'MO', c: 4, r: 4, d: 0.78, dma: 'St Louis' }, { a: 'KY', c: 5, r: 4, d: 0.72 }, { a: 'WV', c: 6, r: 4, d: 0.42 }, { a: 'VA', c: 7, r: 4, d: 0.62 }, { a: 'NJ', c: 8, r: 4, d: 0.42 }, { a: 'DC', c: 9, r: 4, d: 0.30 }, { a: 'DE', c: 10, r: 4, d: 0.30 }, { a: 'AZ', c: 1, r: 5, d: 0.84, dma: 'Phoenix' }, { a: 'NM', c: 2, r: 5, d: 0.55 }, { a: 'KS', c: 3, r: 5, d: 0.55 }, { a: 'AR', c: 4, r: 5, d: 0.78 }, { a: 'TN', c: 5, r: 5, d: 0.84 }, { a: 'NC', c: 6, r: 5, d: 0.86, dma: 'Charlotte' }, { a: 'MD', c: 7, r: 5, d: 0.40 }, { a: 'OK', c: 3, r: 6, d: 0.72 }, { a: 'LA', c: 4, r: 6, d: 0.70 }, { a: 'MS', c: 5, r: 6, d: 0.72 }, { a: 'AL', c: 6, r: 6, d: 0.86 }, { a: 'SC', c: 7, r: 6, d: 0.78 }, { a: 'HI', c: 0, r: 7, d: 0.10 }, { a: 'TX', c: 3, r: 7, d: 1.00, dma: 'Dallas + Houston' }, { a: 'GA', c: 6, r: 7, d: 1.00, dma: 'Atlanta' }, { a: 'FL', c: 7, r: 7, d: 0.94, dma: 'Tampa-St Pete' }, { a: 'AK', c: 0, r: 0, d: 0.10 }];
      const cell = 30, gap = 3, cw = cell + gap, cols = 11, rows = 8, W = cols * cw + 4, H = rows * cw + 6;
      const dFill = d => d < 0.2 ? '#F1EFE8' : d < 0.4 ? '#FAEEDA' : d < 0.6 ? '#FAC775' : d < 0.8 ? '#EF9F27' : '#BA7517';
      const dTxt = d => d >= 0.6 ? '#4A1B0C' : '#5F5E5A';
      const NAMES = { AK: 'Alaska', AL: 'Alabama', AR: 'Arkansas', AZ: 'Arizona', CA: 'California', CO: 'Colorado', CT: 'Connecticut', DC: 'Washington DC', DE: 'Delaware', FL: 'Florida', GA: 'Georgia', HI: 'Hawaii', IA: 'Iowa', ID: 'Idaho', IL: 'Illinois', IN: 'Indiana', KS: 'Kansas', KY: 'Kentucky', LA: 'Louisiana', MA: 'Massachusetts', MD: 'Maryland', ME: 'Maine', MI: 'Michigan', MN: 'Minnesota', MO: 'Missouri', MS: 'Mississippi', MT: 'Montana', NC: 'North Carolina', ND: 'North Dakota', NE: 'Nebraska', NH: 'New Hampshire', NJ: 'New Jersey', NM: 'New Mexico', NV: 'Nevada', NY: 'New York', OH: 'Ohio', OK: 'Oklahoma', OR: 'Oregon', PA: 'Pennsylvania', RI: 'Rhode Island', SC: 'South Carolina', SD: 'South Dakota', TN: 'Tennessee', TX: 'Texas', UT: 'Utah', VA: 'Virginia', VT: 'Vermont', WA: 'Washington', WI: 'Wisconsin', WV: 'West Virginia', WY: 'Wyoming' };
      const tiles = states.map(s => {
        const x = s.c * cw + 2, y = s.r * cw + 2, fill = dFill(s.d), txt = dTxt(s.d);
        const dot = s.dma ? `<circle class="geo-state-dot" cx="${x + cell - 5}" cy="${y + 5}" r="3.2" fill="#FF6F00" stroke="white" stroke-width="1.3"/>` : '';
        const fullName = NAMES[s.a] || s.a, densityLabel = s.d < 0.2 ? 'Very low' : s.d < 0.4 ? 'Low' : s.d < 0.6 ? 'Medium' : s.d < 0.8 ? 'High' : 'Very high';
        const dmaText = s.dma ? `<br>Top DMA: <b>${s.dma}</b>` : '';
        const tipBody = `Density: <b>${densityLabel}</b> &middot; <b>${Math.round(s.d * 100)}/100</b>${dmaText}`;
        const refineDetail = `Filtering to <b>${fullName}</b> shoppers. ${s.dma ? `Includes top DMA: ${s.dma}. ` : ''}A ${densityLabel.toLowerCase()}-density market — useful for geo-targeted flights.`;
        return `<g class="geo-state stream-tile" onmouseenter="showTip(event,'${fullName}','${tipBody}')" onmousemove="moveTip(event)" onmouseleave="hideTip()" onclick="refineFromViz('Focus on ${fullName}','${refineDetail.replace(/'/g, '&#39;')}')"><rect class="geo-state-rect" x="${x}" y="${y}" width="${cell}" height="${cell}" fill="${fill}" rx="5"/><text class="geo-state-abbr" x="${x + cell / 2}" y="${y + cell / 2 + 3}" text-anchor="middle" fill="${txt}">${s.a}</text>${dot}</g>`;
      }).join('');
      return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" role="img" aria-label="US density tile map">${tiles}</svg>`;
    }

    function buildHHTypeRow(t) {
      const people = t.people.map(p => p === 'k' ? `<div class="hh-person kid"><div class="hh-person-head"></div><div class="hh-person-body"></div></div>` : `<div class="hh-person"><div class="hh-person-head"></div><div class="hh-person-body"></div></div>`).join('');
      const idxCls = t.featured ? 'over' : 'neutral', fillCls = t.featured ? 'featured' : '';
      const adultCount = t.people.filter(p => p === 'a').length, kidCount = t.people.filter(p => p === 'k').length;
      const composition = `${adultCount} adult${adultCount > 1 ? 's' : ''}${kidCount ? ` + ${kidCount} kid${kidCount > 1 ? 's' : ''}` : ''}`;
      const tipBody = `<b>${t.pct}%</b> of audience &middot; ${composition}<br>${t.featured ? 'Over-indexes vs US' : 'At or below US baseline'}`;
      const filteredReach = (28 * t.pct / 100).toFixed(1);
      const refineDetail = `Filtering to <b>${t.name}</b> households. Estimated reach: <b>${filteredReach}M</b> HHs. ${t.featured ? 'Over-indexes — concentrate creative around family occasions.' : 'Does not over-index — better used as suppression.'}`;
      return `<div class="hh-type-row" onmouseenter="showTip(event,'${t.name}','${tipBody}')" onmousemove="moveTip(event)" onmouseleave="hideTip()" onclick="refineFromViz('Drill into ${t.name}','${refineDetail.replace(/'/g, '&#39;')}')"><div class="hh-people-cell"><div class="hh-people">${people}</div><div class="hh-type-name">${t.name}</div></div><div class="hh-type-bar"><div class="hh-type-fill ${fillCls}" data-target-width="${t.pct * 3}%" style="width:0"></div></div><div class="hh-type-pct">${t.pct}%</div><div class="hh-type-idx ${idxCls}">${t.idx}</div></div>`;
    }

    /* streaming reveal */
    function preStreamSetup(w) { w.querySelectorAll('.stream-path').forEach(p => { try { const len = p.getTotalLength(); p.dataset.pathLen = len; p.style.strokeDasharray = len; p.style.strokeDashoffset = len; } catch (e) { } }); }
    function streamReveal(w) {
      const blocks = w.querySelectorAll('.stream-block');
      blocks.forEach((b, i) => setTimeout(() => {
        b.classList.add('in');
        handleSpecialReveal(b);
        setTimeout(() => {
          const c = convoScroll; if (!c) return;
          const br = b.getBoundingClientRect(), cr = c.getBoundingClientRect();
          if (br.bottom > cr.bottom - 30 || br.top < cr.top + 8) { b.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }
        }, 300);
      }, 120 + i * 620));
    }
    function handleSpecialReveal(block) {
      block.querySelectorAll('.stream-stagger').forEach((c, i) => setTimeout(() => c.classList.add('in'), i * 90));
      block.querySelectorAll('[data-target-width]').forEach((bar, i) => setTimeout(() => { bar.style.width = bar.dataset.targetWidth; }, 200 + i * 60));
      const path = block.querySelector('.stream-path');
      if (path && path.dataset.pathLen) setTimeout(() => { path.style.transition = 'stroke-dashoffset 1.1s ease-in-out'; path.style.strokeDashoffset = 0; }, 280);
      block.querySelectorAll('.stream-fill-area').forEach(e => setTimeout(() => e.classList.add('in'), 780));
      block.querySelectorAll('.stream-late').forEach(e => setTimeout(() => e.classList.add('in'), 1080));
      block.querySelectorAll('.stream-tile').forEach((t, i) => setTimeout(() => t.classList.add('in'), 80 + i * 12));
    }

    /* tooltip + refine */
    function _getTip() { let tt = document.getElementById('dpTooltip'); if (!tt) { tt = document.createElement('div'); tt.id = 'dpTooltip'; tt.className = 'dp-tooltip'; tt.innerHTML = '<div class="dp-tt-title"></div><div class="dp-tt-body"></div>'; document.body.appendChild(tt); } return tt; }
    function showTip(e, title, body) { const tt = _getTip(); tt.querySelector('.dp-tt-title').textContent = title; tt.querySelector('.dp-tt-body').innerHTML = body; tt.classList.add('show'); moveTip(e); }
    function moveTip(e) { const tt = document.getElementById('dpTooltip'); if (!tt) return; const r = tt.getBoundingClientRect(); let x = e.clientX + 14, y = e.clientY + 14; if (x + r.width > window.innerWidth - 10) x = e.clientX - r.width - 14; if (y + r.height > window.innerHeight - 10) y = e.clientY - r.height - 14; tt.style.left = x + 'px'; tt.style.top = y + 'px'; }
    function hideTip() { const tt = document.getElementById('dpTooltip'); if (tt) tt.classList.remove('show'); }
    function refineFromViz(userAction, detail) { hideTip(); addUserMsg(userAction); agentNote(detail); }

    /* ============================================================
       CONTEXT MENU + THEME + MISC
       ============================================================ */
    function toggleCtxMenu(e) {
      e.stopPropagation();
      const m = document.getElementById('ctxMenu');
      const r = e.currentTarget.getBoundingClientRect();
      m.style.top = (r.bottom + 6) + 'px'; m.style.left = Math.max(12, r.left - 40) + 'px';
      m.classList.toggle('open');
    }
    function closeCtxMenu() { document.getElementById('ctxMenu').classList.remove('open'); }
    function ctxNote(t) { closeCtxMenu(); if (firstTurn) agentNote(t); }

    /* + composer menu (opens upward from the + button) */
    function togglePlusMenu(e) {
      e.stopPropagation(); closeCtxMenu(); closeSettings();
      const m = document.getElementById('plusMenu');
      const r = e.currentTarget.getBoundingClientRect();
      m.style.left = r.left + 'px';
      m.style.bottom = (window.innerHeight - r.top + 8) + 'px';
      m.style.top = 'auto';
      m.classList.toggle('open');
    }
    function closePlusMenu() { document.getElementById('plusMenu').classList.remove('open'); }
    function plusNote(t) { closePlusMenu(); if (firstTurn) agentNote(t); }
    function setStyle(name) { closePlusMenu(); if (firstTurn) agentNote('Response style set to <b>' + name + '</b> for this conversation.'); }

    /* inline rename of the conversation title */
    function startRename() {
      closeCtxMenu();
      if (!firstTurn) return;
      const sp = document.getElementById('convoTitleText');
      sp.contentEditable = 'true'; sp.classList.add('editing'); sp.focus();
      const r = document.createRange(); r.selectNodeContents(sp);
      const s = window.getSelection(); s.removeAllRanges(); s.addRange(r);
      function done() { sp.contentEditable = 'false'; sp.classList.remove('editing'); const t = sp.textContent.trim(); sp.textContent = t || 'Untitled audience'; sp.removeEventListener('keydown', onKey); sp.removeEventListener('blur', done); }
      function onKey(e) { if (e.key === 'Enter') { e.preventDefault(); sp.blur(); } else if (e.key === 'Escape') { e.preventDefault(); sp.blur(); } }
      sp.addEventListener('keydown', onKey); sp.addEventListener('blur', done);
    }

    /* settings overlay (holds the light/dark toggle) */
    function toggleSettings(e) {
      e.stopPropagation(); closeCtxMenu();
      const m = document.getElementById('settingsPop');
      const r = e.currentTarget.getBoundingClientRect();
      m.style.left = r.left + 'px';
      m.style.bottom = (window.innerHeight - r.top + 8) + 'px';
      m.style.top = 'auto';
      m.classList.toggle('open');
    }
    function closeSettings() { document.getElementById('settingsPop').classList.remove('open'); }

    document.addEventListener('click', e => {
      if (!e.target.closest('#ctxMenu') && !e.target.closest('.convo-title-dots')) closeCtxMenu();
      if (!e.target.closest('#settingsPop') && !e.target.closest('[onclick*="toggleSettings"]')) closeSettings();
      if (!e.target.closest('#plusMenu') && !e.target.closest('[onclick*="togglePlusMenu"]')) closePlusMenu();
      if (!e.target.closest('.resolve-chip')) { const rm = document.getElementById('resolveMenu'); if (rm) rm.classList.remove('open'); }
    });

    function setTheme(next) {
      document.documentElement.setAttribute('data-theme', next);
      const sw = document.getElementById('themeSwitch'); if (sw) sw.classList.toggle('on', next === 'dark');
    }
    function toggleTheme() { setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }

    /* INIT */
    populateProjectMenu();
    renderDrawer();
    renderEmpty();
  </script>
</body>

</html>
