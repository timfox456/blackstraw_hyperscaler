<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Liquid AI · Audience Activation — Agentic Prototype</title>
  <script type="text/javascript" src="//use.typekit.net/ohu5svr.js"></script>
  <script type="text/javascript">try { Typekit.load(); } catch (e) { }</script>
  <style>
    :root {
      --primary: #4A90E2;
      --primary-dark: #29578D;
      --secondary: #FF9B40;
      --secondary-dark: #EA8931;
      --up: #7B3FA0;
      --up-light: #9B59C0;
      --up-bg: rgba(123, 63, 160, 0.08);
      --bg: #EBEBEB;
      --surface: #FFFFFF;
      --card: #FFFFFF;
      --el: #EFEFEF;
      --hover: rgba(74, 144, 226, 0.06);
      --border: #E4E4E4;
      --bm: #D7D7D7;
      --bh: #B9B9B9;
      --t1: #212121;
      --t2: #212121;
      --t3: #787885;
      --t4: #B9B9B9;
      --green: #00B929;
      --red: #FF2D2E;
      --yellow: #FFC500;
      --green-bg: rgba(0, 185, 41, 0.08);
      --amber-bg: rgba(255, 155, 64, 0.10);
      --red-bg: rgba(255, 45, 46, 0.08);
      --purple-bg: rgba(156, 39, 176, 0.08);
      --emiri: #9C27B0;
      --activate: #FF6F00;
      --user-bubble: #DCE6F4;
      --sh-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
      --sh-md: 0 4px 12px rgba(0, 0, 0, 0.06);
      --sh-lg: 0 12px 40px rgba(0, 0, 0, 0.14);
      --rail-sep: #E4E4E4;
    }

    [data-theme="dark"] {
      --bg: #0A0D12;
      --surface: #0F1318;
      --card: #151B22;
      --el: #1C2430;
      --hover: rgba(74, 144, 226, 0.08);
      --border: #1E2732;
      --bm: #273040;
      --bh: #384860;
      --t1: #E8EDF3;
      --t2: #8FA3B8;
      --t3: #7C8DA0;
      --t4: #46586d;
      --up-bg: rgba(123, 63, 160, 0.18);
      --green-bg: rgba(0, 185, 41, 0.12);
      --amber-bg: rgba(255, 155, 64, 0.14);
      --red-bg: rgba(255, 45, 46, 0.12);
      --user-bubble: rgba(74, 144, 226, 0.20);
      --sh-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
      --sh-md: 0 4px 12px rgba(0, 0, 0, 0.5);
      --sh-lg: 0 12px 40px rgba(0, 0, 0, 0.6);
      --rail-sep: #1E2732;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      height: 100%;
      overflow: hidden
    }

    body {
      font-family: 'proxima-nova', Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--t1);
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      background: none;
      color: inherit
    }

    input,
    textarea {
      font-family: inherit;
      color: inherit
    }

    /* ============ TOPBAR ============ */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--rail-sep);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 22px;
      z-index: 40;
    }

    .tb-left,
    .tb-right {
      display: flex;
      align-items: center;
      gap: 16px
    }

    .tb-right {
      justify-content: flex-end
    }

    .tb-center {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px
    }

    .tb-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--t2);
      transition: background .15s;
    }

    .tb-icon:hover {
      background: var(--el)
    }

    .tb-icon svg {
      width: 19px;
      height: 19px
    }

    .circana-logo {
      display: flex;
      align-items: center;
      gap: 6px
    }

    .circana-ring {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 3px solid;
      border-color: var(--primary) var(--up) var(--secondary) var(--emiri);
      transform: rotate(-25deg);
    }

    .circana-text {
      font-size: 21px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--t1)
    }

    .bell-wrap {
      position: relative
    }

    .bell-badge {
      position: absolute;
      top: 0px;
      right: 0px;
      background: var(--secondary);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 5px 11px;
      border-radius: 20px
    }

    .user-chip:hover {
      background: var(--el)
    }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FFB088, #E89A78);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: -0.02em;
      flex-shrink: 0;
      overflow: hidden;
    }

    .user-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--t1)
    }

    .liquidai-mark {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.03em;
      padding: 0 4px;
      color: var(--t1);
    }

    .liquidai-mark .ai {
      color: var(--t1)
    }

    .convo-title.empty-title {
      visibility: hidden
    }

    .theme-toggle {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--t3);
    }

    .theme-toggle:hover {
      background: var(--el);
      color: var(--t2)
    }

    .theme-toggle svg {
      width: 18px;
      height: 18px
    }

    /* ============ SHELL ============ */
    .shell {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex
    }

    /* ============ RAIL ============ */
    .rail {
      width: 62px;
      background: var(--surface);
      border-right: 1px solid var(--rail-sep);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px 0;
      flex-shrink: 0;
      position: relative;
      z-index: 30;
    }

    .rail-icon {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--t3);
      margin-bottom: 6px;
      transition: background .15s, color .15s;
      position: relative;
    }

    .rail-icon:hover {
      background: var(--el);
      color: var(--t2)
    }

    .rail-icon.active {
      background: var(--activate);
      color: #fff;
    }

    .rail-icon svg {
      width: 20px;
      height: 20px
    }

    .rail-spacer {
      flex: 1
    }

    .drawer-expander {
      position: absolute;
      top: 17px;
      left: 16px;
      width: 22px;
      height: 22px;
      background: none;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--t3);
      z-index: 35;
      transition: transform .2s;
    }

    .drawer-expander:hover {
      color: var(--t1)
    }

    .drawer-expander svg {
      width: 15px;
      height: 15px;
      transition: transform .2s
    }

    body.drawer-open .drawer-expander {
      left: 256px
    }

    body.drawer-open .drawer-expander svg {
      transform: rotate(180deg)
    }

    /* ============ HISTORY DRAWER ============ */
    .drawer {
      width: 0;
      flex-shrink: 0;
      overflow: hidden;
      background: var(--surface);
      border-right: 1px solid var(--rail-sep);
      transition: width .22s ease;
      display: flex;
      flex-direction: column;
    }

    body.drawer-open .drawer {
      width: 290px
    }

    .drawer-inner {
      width: 290px;
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 14px 0 0
    }

    .drawer-tabs {
      display: flex;
      gap: 22px;
      padding: 0 18px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 14px
    }

    .drawer-tab {
      font-size: 13px;
      font-weight: 600;
      color: var(--t3);
      padding: 6px 0 10px;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }

    .drawer-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary)
    }

    .drawer-search {
      margin: 0 16px 14px;
      position: relative
    }

    .drawer-search input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 9px 14px 9px 34px;
      font-size: 12.5px;
      color: var(--t1);
      outline: none;
    }

    .drawer-search svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      color: var(--t3)
    }

    .drawer-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 20px
    }

    .drawer-group {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--t4);
      padding: 14px 10px 6px
    }

    .drawer-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--t2);
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
    }

    .drawer-item:hover {
      background: var(--el);
      color: var(--t1)
    }

    .drawer-item.active {
      background: var(--el);
      color: var(--t1);
      font-weight: 600
    }

    .drawer-item.active svg {
      color: var(--primary)
    }

    .drawer-empty {
      padding: 18px 12px;
      font-size: 12.5px;
      color: var(--t4);
      text-align: center
    }

    .drawer-tab {
      cursor: pointer
    }

    .drawer-item .proj-count {
      margin-left: auto;
      font-size: 11px;
      color: var(--t4);
      font-weight: 600;
      padding-left: 8px
    }

    .drawer-item svg {
      width: 14px;
      height: 14px;
      color: var(--t3);
      flex-shrink: 0
    }

    .drawer-item span {
      overflow: hidden;
      text-overflow: ellipsis
    }

    .drawer-sources {
      border-top: 1px solid var(--border);
      padding: 12px 18px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--t3);
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .drawer-settings {
      border-top: 1px solid var(--border);
      padding: 13px 18px;
      width: 100%;
      background: none;
      border-left: none;
      border-right: none;
      border-bottom: none;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--t2);
      cursor: pointer;
      text-align: left
    }

    .drawer-settings:hover {
      background: var(--el);
      color: var(--t1)
    }

    .drawer-settings svg {
      width: 16px;
      height: 16px;
      color: var(--t3)
    }

    .drawer-settings:hover svg {
      color: var(--t1)
    }

    /* ============ MAIN ============ */
    .main {
      flex: 1 1 0;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      min-width: 0;
      position: relative;
      transition: flex .28s ease
    }

    body.pinned .main {
      flex: 45 1 0
    }

    .main-bar {
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--rail-sep);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px 0 50px;
      flex-shrink: 0;
    }

    body.drawer-open .main-bar {
      padding-left: 28px
    }

    .convo-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--t1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .convo-title-dots {
      width: 24px;
      height: 24px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--t3);
      font-size: 17px;
      line-height: 1;
    }

    .convo-title-dots:hover {
      background: var(--el);
      color: var(--t1)
    }

    .convo-title-text {
      cursor: text;
      border-radius: 5px;
      padding: 2px 5px;
      margin: -2px -5px;
      max-width: 70vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .convo-title-text:hover {
      background: var(--el)
    }

    .convo-title-text.editing {
      background: var(--surface);
      outline: 2px solid var(--primary);
      cursor: text;
      white-space: normal
    }

    .btn-new {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--primary);
      font-size: 14px;
      font-weight: 600;
      padding: 7px 12px;
      border-radius: 7px;
      white-space: nowrap;
    }

    .btn-new:hover {
      background: var(--hover)
    }

    .btn-new svg {
      width: 17px;
      height: 17px
    }

    /* ============ CONVO ============ */
    .convo {
      flex: 1;
      overflow-y: auto;
      padding: 26px 40px 190px;
      scroll-behavior: smooth
    }

    .convo-inner {
      max-width: 1240px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px
    }

    /* ============ EMPTY STATE ============ */
    .empty-state {
      position: absolute;
      inset: 56px 0 0 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 36px
    }

    .es-pad {
      flex: 1 1 0;
      display: flex;
      justify-content: center;
      width: 100%;
      min-height: 0
    }

    .es-pad.es-top {
      align-items: flex-end
    }

    .es-pad.es-bot {
      align-items: flex-start
    }

    .es-examples {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 18px
    }

    .empty-help {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 15px;
      color: var(--t2);
      font-weight: 400;
      margin-bottom: 26px
    }

    .guide-btn {
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      border: 1px solid var(--primary);
      border-radius: 8px;
      padding: 6px 14px
    }

    .guide-btn:hover {
      background: var(--hover)
    }

    .guide-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.32);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px
    }

    .guide-modal {
      background: var(--surface);
      border-radius: 16px;
      box-shadow: var(--sh-lg);
      width: min(580px, 100%);
      max-height: 82vh;
      overflow: auto;
      padding: 22px 24px
    }

    .guide-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px
    }

    .guide-head span {
      font-size: 17px;
      font-weight: 700;
      color: var(--t1)
    }

    .guide-close {
      font-size: 22px;
      line-height: 1;
      color: var(--t3);
      background: none;
      border: none;
      cursor: pointer;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .guide-close:hover {
      background: var(--el);
      color: var(--t1)
    }

    .guide-list {
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .guide-prompt {
      text-align: left;
      background: #F7F8FA;
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13.5px;
      color: var(--t1);
      cursor: pointer;
      line-height: 1.45;
      transition: border-color .15s, background .15s
    }

    .guide-prompt:hover {
      border-color: var(--primary);
      background: rgba(74, 144, 226, 0.08)
    }

    .empty-composer {
      width: 100%;
      max-width: 880px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px 22px 12px;
      box-shadow: var(--sh-md);
      min-height: 150px;
      display: flex;
      flex-direction: column;
      justify-content: space-between
    }

    .empty-composer .ec-input {
      font-size: 17px;
      color: var(--t3);
      outline: none;
      min-height: 54px;
      flex: 1
    }

    .empty-composer .ec-input[contenteditable]:empty::before {
      content: attr(data-placeholder);
      color: var(--t3)
    }

    .empty-composer .ec-input[contenteditable] {
      color: var(--t1)
    }

    .ec-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 8px
    }

    .ec-plus {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      color: var(--t3);
      display: flex;
      align-items: center;
      justify-content: center
    }

    .ec-plus svg {
      width: 20px;
      height: 20px
    }

    .ec-plus:hover {
      background: var(--el);
      color: var(--t2)
    }

    .ec-plus:hover {
      background: var(--el)
    }

    .ec-right {
      display: flex;
      align-items: center;
      gap: 14px
    }

    .ec-model {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--t2)
    }

    .ec-model::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--up)
    }

    .ec-mic {
      width: 26px;
      height: 26px;
      color: var(--t3);
      display: flex;
      align-items: center;
      justify-content: center
    }

    .ec-mic svg {
      width: 23.04px;
      height: 23.04px
    }

    .example-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--t3);
      margin-top: 26px
    }

    .example-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      max-width: 880px;
      margin-top: 12px
    }

    .example-chip {
      text-align: left;
      background: rgba(255, 255, 255, 0.35);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      max-width: 270px;
      transition: border-color .15s, transform .15s, box-shadow .15s
    }

    .example-chip:hover {
      border-color: var(--primary);
      transform: translateY(-1px);
      box-shadow: var(--sh-md)
    }

    .example-chip .ex-label {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--activate);
      margin-bottom: 6px
    }

    .example-chip .ex-text {
      font-size: 13px;
      color: var(--t1);
      line-height: 1.4
    }

    /* ============ MESSAGES ============ */
    .msg-user {
      align-self: flex-end;
      max-width: 60%;
      background: var(--user-bubble);
      color: var(--t1);
      padding: 13px 20px;
      border-radius: 20px;
      font-size: 14px;
      line-height: 1.5
    }

    .msg-agent {
      align-self: flex-start;
      max-width: 740px;
      width: 100%
    }

    .msg-agent.wide {
      max-width: 880px
    }

    /* planning checklist (refs-style: blue check / gray dot) */
    .planning {
      padding: 4px 2px 2px
    }

    .plan-summary {
      display: none;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      color: var(--t3);
      font-size: 12.5px;
      font-weight: 500;
      padding: 5px 4px;
      border-radius: 7px;
      width: fit-content
    }

    .plan-summary:hover {
      color: var(--t1);
      background: var(--hover)
    }

    .plan-summary .plan-chevron {
      width: 13px;
      height: 13px;
      transition: transform .2s
    }

    .planning.done .plan-summary {
      display: inline-flex
    }

    .planning.done .plan-steps {
      display: none
    }

    .planning.done.expanded .plan-steps {
      display: block;
      padding-top: 6px
    }

    .planning.done.expanded .plan-chevron {
      transform: rotate(90deg)
    }

    .planning.done.expanded .planning-head {
      display: none
    }

    .planning-head {
      font-size: 15px;
      font-weight: 700;
      color: var(--t1);
      margin-bottom: 14px
    }

    .planning-row {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 6px 0;
      font-size: 14px;
      color: var(--t3);
      opacity: 0;
      transform: translateY(4px);
      transition: opacity .3s, transform .3s, color .3s
    }

    .planning-row.in {
      opacity: 1;
      transform: translateY(0)
    }

    .planning-row.done {
      color: var(--t1)
    }

    .pcheck {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .planning-row .pcheck .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--t4)
    }

    .planning-row .pcheck .tick {
      display: none;
      width: 16px;
      height: 16px;
      color: var(--primary)
    }

    .planning-row.done .pcheck .dot {
      display: none
    }

    .planning-row.done .pcheck .tick {
      display: block
    }

    /* panels */
    .panel {
      background: var(--card);
      border-radius: 16px;
      padding: 22px 24px;
      border: 1px solid var(--border)
    }

    .panel-lead {
      font-size: 15px;
      color: var(--t1);
      margin-bottom: 16px;
      font-weight: 600
    }

    .panel-line {
      font-size: 13.5px;
      color: var(--t1);
      margin: 14px 0 12px;
      line-height: 1.55
    }

    .banner {
      padding: 12px 15px;
      border-radius: 9px;
      font-size: 13px;
      line-height: 1.5;
      display: flex;
      align-items: flex-start;
      gap: 9px;
      margin: 14px 0
    }

    .banner svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      margin-top: 1px
    }

    .banner.success {
      background: var(--green-bg);
      color: #0a7320
    }

    .banner.amber {
      background: var(--amber-bg);
      color: #a86518
    }

    .banner.error {
      background: var(--red-bg);
      color: #c41f20
    }

    [data-theme="dark"] .banner.success {
      color: #7CD893
    }

    [data-theme="dark"] .banner.amber {
      color: #FFB875
    }

    [data-theme="dark"] .banner.error {
      color: #FF8585
    }

    /* resolution chip */
    .resolve-line {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 13px;
      color: var(--t2);
      margin: 2px 0 4px
    }

    .resolve-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 5px 10px;
      font-size: 12px;
      color: var(--t1);
      position: relative
    }

    .resolve-chip .rc-check {
      width: 14px;
      height: 14px;
      color: var(--green)
    }

    .resolve-chip .rc-alt {
      color: var(--primary);
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 3px
    }

    .resolve-menu {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--sh-lg);
      padding: 6px;
      min-width: 230px;
      z-index: 50;
      display: none
    }

    .resolve-menu.open {
      display: block
    }

    .resolve-opt {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 7px;
      font-size: 12.5px;
      color: var(--t1);
      cursor: pointer
    }

    .resolve-opt:hover {
      background: var(--el)
    }

    .resolve-opt small {
      color: var(--t3);
      font-size: 11px
    }

    .resolve-opt.current {
      color: var(--primary);
      font-weight: 600
    }

    /* ============ EDITABLE AUDIENCE TILE ============ */
    .aud-tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0;
      overflow: hidden;
      box-shadow: var(--sh-sm)
    }

    .aud-tile-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--card)
    }

    .aud-tile-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 700;
      color: var(--t1)
    }

    .aud-status {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 7px
    }

    .aud-status.built {
      background: var(--green-bg);
      color: var(--green)
    }

    .aud-status.scaled {
      background: rgba(123, 63, 160, 0.12);
      color: var(--up)
    }

    .aud-status.ready {
      background: rgba(74, 144, 226, 0.12);
      color: var(--primary)
    }

    .aud-status.activated {
      background: rgba(255, 111, 0, 0.14);
      color: var(--activate)
    }

    .aud-status.incomplete {
      background: var(--amber-bg);
      color: #a86518
    }

    .aud-tile-hint {
      font-size: 11.5px;
      color: var(--t3);
      font-style: italic
    }

    .aud-collapse-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
      padding: 5px 10px;
      border-radius: 7px
    }

    .aud-collapse-toggle:hover {
      background: var(--hover)
    }

    .aud-collapse-toggle svg {
      width: 13px;
      height: 13px;
      transition: transform .18s
    }

    .aud-collapse-toggle.open svg {
      transform: rotate(90deg)
    }

    .aud-tile-body {
      padding: 8px 20px 6px
    }

    .aud-grp {
      display: grid;
      grid-template-columns: 108px 1fr;
      gap: 10px;
      align-items: start;
      padding: 11px 0;
      border-bottom: 1px solid var(--border)
    }

    .aud-grp:last-of-type {
      border-bottom: none
    }

    .aud-grp-label {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--t3);
      padding-top: 6px
    }

    .aud-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 7px
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 12px;
      border-radius: 9px;
      font-size: 12.5px;
      font-weight: 500;
      background: var(--surface);
      border: 1px solid var(--bm);
      color: var(--t1);
      cursor: pointer;
      transition: border-color .15s, background .15s;
      position: relative
    }

    .pill::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 2px;
      flex-shrink: 0
    }

    .pill:hover {
      border-color: var(--primary);
      background: var(--hover)
    }

    .pill.type::before {
      background: var(--up)
    }

    .pill.scope-product::before {
      background: var(--primary)
    }

    .pill.scope-time::before {
      background: var(--green)
    }

    .pill.scope-geo::before {
      background: #0090c0
    }

    .pill.measure::before {
      background: var(--secondary)
    }

    .pill.attribute::before {
      background: var(--up-light)
    }

    .pill.dest::before {
      background: var(--activate)
    }

    .pill.missing {
      border-style: dashed;
      color: #a86518;
      border-color: #d9a441
    }

    .pill.missing::before {
      background: #d9a441
    }

    .pill-add {
      border: 1px dashed var(--bm);
      background: none;
      color: var(--t3);
      padding: 6px 11px;
      display: inline-flex;
      align-items: center;
      justify-content: center
    }

    .pill-add::before {
      display: none
    }

    .pill-add svg {
      width: 14px;
      height: 14px
    }

    .pill-add:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--hover)
    }

    .pill-add.danger {
      border-color: var(--red);
      color: var(--red)
    }

    .pill-add.danger:hover {
      border-color: var(--red);
      color: var(--red);
      background: rgba(255, 45, 46, 0.07)
    }

    .pill-x {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      color: var(--t4);
      font-size: 14px;
      line-height: 1;
      margin: -1px -3px -1px 1px
    }

    .pill-x:hover {
      background: var(--bm);
      color: var(--t1)
    }

    .aud-result-strip {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      background: var(--green-bg);
      color: #0a7320;
      font-size: 12px;
      font-weight: 500;
      padding: 9px 14px;
      margin: 10px 0 0;
      border-radius: 9px
    }

    [data-theme="dark"] .aud-result-strip {
      color: #7CD893
    }

    .aud-result-strip .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: currentColor;
      opacity: .5
    }

    /* ===== pin / side panel (dual-mode) ===== */
    .aud-tile-head-right {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .pin-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid var(--bm);
      background: var(--surface);
      color: var(--t3);
      cursor: pointer;
      transition: all .15s;
      flex-shrink: 0
    }

    .pin-btn:hover {
      color: var(--primary);
      border-color: var(--primary);
      background: var(--hover)
    }

    .pin-btn svg {
      width: 16px;
      height: 16px
    }

    .pin-btn.active {
      color: var(--primary);
      border-color: var(--primary);
      background: rgba(74, 144, 226, 0.1)
    }

    .aud-panel {
      flex: 0 0 0;
      width: 0;
      min-width: 0;
      overflow: hidden;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      transition: flex .28s ease, width .28s ease
    }

    body.pinned .aud-panel {
      flex: 55 1 0;
      width: auto
    }

    .pane-resizer {
      display: none;
      position: relative;
      align-self: stretch;
      background: var(--rail-sep);
      z-index: 5;
      cursor: col-resize
    }

    body.pinned .pane-resizer {
      display: block;
      flex: 0 0 1px
    }

    .pane-resizer::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: -4px;
      right: -4px;
      cursor: col-resize
    }

    .pane-resizer::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: -1px;
      width: 3px;
      background: var(--primary);
      opacity: 0;
      transition: opacity .15s
    }

    .pane-resizer:hover::after,
    body.resizing .pane-resizer::after {
      opacity: .45
    }

    body.resizing {
      cursor: col-resize;
      user-select: none
    }

    body.resizing .main,
    body.resizing .aud-panel {
      transition: none
    }

    .aud-panel-bar {
      height: 56px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 22px;
      background: var(--surface)
    }

    .aud-panel-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--t1)
    }

    .aud-panel-dot {
      color: var(--t4)
    }

    .aud-panel-sub {
      font-size: 13px;
      color: var(--t3)
    }

    .aud-panel-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 22px 24px
    }

    .aud-panel-body {
      max-width: 760px;
      margin: 0 auto
    }

    .panel-kpis {
      margin-bottom: 18px
    }

    .pin-breadcrumb {
      font-size: 12.5px;
      color: var(--t3);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 2px
    }

    .pin-coach {
      position: fixed;
      z-index: 210;
      max-width: 240px;
      background: var(--t1);
      color: var(--surface);
      font-size: 12.5px;
      line-height: 1.45;
      padding: 10px 13px;
      border-radius: 10px;
      box-shadow: var(--sh-lg)
    }

    .pin-coach:after {
      content: "";
      position: absolute;
      top: -6px;
      right: 18px;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-bottom: 6px solid var(--t1)
    }

    .pin-coach .pc-dismiss {
      display: block;
      margin-top: 7px;
      font-weight: 700;
      color: #9cc4f5;
      cursor: pointer
    }

    .aud-actions {
      display: flex;
      gap: 9px;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
      align-items: center
    }

    /* buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 17px;
      border-radius: 21px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid var(--bm);
      background: var(--surface);
      color: var(--t1);
      transition: background .15s, border-color .15s;
      white-space: nowrap
    }

    .btn:hover {
      background: var(--el);
      border-color: var(--bh)
    }

    .btn svg {
      width: 15px;
      height: 15px
    }

    .btn.primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary)
    }

    .btn.primary:hover {
      background: var(--primary-dark);
      border-color: var(--primary-dark)
    }

    .btn.activate-color {
      background: var(--activate);
      color: #fff;
      border-color: var(--activate)
    }

    .btn.activate-color:hover {
      filter: brightness(0.93)
    }

    .btn.activate-go {
      background: #4CAF52;
      color: #fff;
      border-color: #4CAF52
    }

    .btn.activate-go:hover {
      filter: brightness(0.94)
    }

    .btn.activate-go svg {
      width: 15px;
      height: 15px
    }

    .chip.go-chip {
      background: #4CAF52;
      border-color: #4CAF52;
      color: #fff
    }

    .chip.go-chip:hover {
      background: #4CAF52;
      border-color: #4CAF52;
      color: #fff;
      filter: brightness(0.94)
    }

    .btn.ghost {
      border-color: var(--bm)
    }

    /* chip rows (follow-ups) */
    .followup-section {
      margin-top: 16px
    }

    .followup-label {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 9px
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 13px;
      border-radius: 15px;
      font-size: 12.5px;
      font-weight: 500;
      border: 1px solid var(--bm);
      background: var(--surface);
      color: var(--t2);
      cursor: pointer;
      transition: all .15s
    }

    .chip:hover {
      background: var(--hover);
      border-color: var(--primary);
      color: var(--primary)
    }

    .chip svg {
      width: 13px;
      height: 13px
    }

    .chip.activate-chip {
      border-color: var(--activate);
      color: var(--activate)
    }

    .chip.disabled,
    .chip:disabled {
      opacity: .4;
      cursor: not-allowed;
      pointer-events: none
    }

    .chip-more .more-dots {
      display: inline-flex;
      align-items: center
    }

    .chip-more .more-dots svg {
      width: 16px;
      height: 16px
    }

    .chip-more .more-open {
      display: none;
      align-items: center;
      gap: 6px
    }

    .chip-more .more-open svg {
      width: 13px;
      height: 13px
    }

    .chip-more.open .more-dots {
      display: none
    }

    .chip-more.open .more-open {
      display: inline-flex
    }

    .chip.activate-chip:hover {
      background: rgba(255, 111, 0, 0.07);
      border-color: var(--activate);
      color: var(--activate)
    }

    .chip.retailer {
      border-style: dashed;
      border-color: #E31837;
      color: #E31837
    }

    .chip.retailer:hover {
      background: rgba(227, 24, 55, 0.06);
      border-color: #E31837;
      color: #E31837
    }

    .chip.recover {
      border-color: var(--green);
      color: var(--green)
    }

    .chip.recover:hover {
      background: var(--green-bg);
      border-color: var(--green);
      color: var(--green)
    }

    .chip.confirm {
      border-color: var(--green);
      color: var(--green);
      background: var(--surface)
    }

    .chip.confirm:hover {
      background: var(--green-bg);
      border-color: var(--green);
      color: var(--green)
    }

    /* KPI cards */
    .kpi-row {
      display: grid;
      gap: 12px;
      margin: 4px 0 0
    }

    .kpi-row.cols-1 {
      grid-template-columns: minmax(0, 1fr)
    }

    .kpi-row.cols-1 .kpi {
      max-width: 300px
    }

    .kpi-row.cols-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr))
    }

    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 13px;
      padding: 15px 17px;
      min-width: 0;
      position: relative;
      overflow: hidden
    }

    .kpi-label {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 7px
    }

    .kpi-value {
      font-size: 30px;
      font-weight: 700;
      color: var(--t1);
      letter-spacing: -0.02em;
      line-height: 1.05;
      margin-bottom: 5px
    }

    .kpi-value.det,
    .kpi-value.prob,
    .kpi-value.total {
      color: var(--t1)
    }

    .kpi-sub {
      font-size: 11.5px;
      color: var(--t3)
    }

    /* details table */
    .dtable {
      margin: 16px 0 6px;
      border-top: 1px solid var(--border)
    }

    .drow {
      display: grid;
      grid-template-columns: 150px 1fr;
      padding: 12px 4px;
      border-bottom: 1px solid var(--border);
      font-size: 13px
    }

    .drow-label {
      color: var(--t3);
      font-weight: 600
    }

    .drow-value {
      color: var(--t1)
    }

    .drow-value div {
      margin-bottom: 4px
    }

    .drow-value div:last-child {
      margin-bottom: 0
    }

    .expand-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--primary);
      cursor: pointer;
      padding: 8px 2px
    }

    .expand-row svg {
      width: 14px;
      height: 14px;
      transition: transform .2s
    }

    .expand-row.open svg {
      transform: rotate(90deg)
    }

    .expand-body {
      display: none
    }

    .expand-body.open {
      display: block
    }

    /* gate panel */
    .gate {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 13px;
      padding: 8px 18px;
      margin: 6px 0
    }

    .gate-row {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px
    }

    .gate-row:last-child {
      border-bottom: none
    }

    .gate-ic {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0
    }

    .gate-ic svg {
      width: 13px;
      height: 13px;
      color: #fff
    }

    .gate-ic.pass {
      background: var(--green)
    }

    .gate-ic.fail {
      background: var(--red)
    }

    .gate-ic.pending {
      background: var(--bh)
    }

    .gate-name {
      font-weight: 600;
      color: var(--t1)
    }

    .gate-detail {
      color: var(--t3);
      font-size: 12px;
      margin-left: auto
    }

    .gate-detail.fail {
      color: var(--red);
      font-weight: 600
    }

    /* destination selector */
    .dest-group {
      margin-top: 6px
    }

    .dest-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 6px 0
    }

    /* measure builder */
    .mb-section {
      margin-top: 16px
    }

    .mb-section:first-of-type {
      margin-top: 6px
    }

    .mb-label {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 9px
    }

    .mb-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px
    }

    .mb-chip {
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      font-size: 13px;
      color: var(--t1);
      cursor: pointer;
      transition: all .15s
    }

    .mb-chip:hover {
      border-color: var(--primary)
    }

    .mb-chip.selected {
      border-color: var(--primary);
      background: rgba(74, 144, 226, 0.08);
      color: var(--primary);
      font-weight: 600
    }

    .mb-values {
      display: flex;
      align-items: center;
      gap: 11px
    }

    .mb-field {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 0 12px;
      background: var(--surface);
      transition: border-color .15s
    }

    .mb-field:focus-within {
      border-color: var(--primary)
    }

    .mb-field .mb-prefix {
      color: var(--t3);
      font-size: 14px;
      margin-right: 2px
    }

    .mb-field input {
      border: none;
      outline: none;
      background: none;
      padding: 9px 2px;
      width: 96px;
      font-size: 14px;
      font-family: inherit;
      color: var(--t1)
    }

    .mb-and {
      font-size: 13px;
      color: var(--t3)
    }

    .tb-hml {
      margin-top: 18px
    }

    .tb-hml-row {
      display: flex;
      align-items: flex-end;
      gap: 14px;
      flex-wrap: wrap
    }

    .tb-hml-field {
      display: flex;
      flex-direction: column;
      gap: 7px
    }

    .tb-hml-field label {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--t2)
    }

    .tb-hml-field input {
      width: 150px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 9px;
      font-size: 15px;
      color: var(--t1);
      background: var(--surface);
      font-family: inherit
    }

    .tb-hml-field input:focus {
      outline: none;
      border-color: var(--primary)
    }

    .tb-hml-total {
      padding: 11px 18px;
      border-radius: 9px;
      background: var(--el);
      font-size: 13.5px;
      font-weight: 600;
      color: var(--t2);
      align-self: flex-end
    }

    .tb-hml-total.full {
      background: rgba(0, 185, 41, 0.1);
      color: var(--green)
    }

    .bare-note {
      font-size: 13.5px;
      color: var(--t2);
      line-height: 1.55;
      padding: 2px 2px
    }

    .dest-tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 15px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      position: relative
    }

    .dest-tile:hover {
      border-color: var(--primary)
    }

    .dest-tile.selected {
      border-color: var(--primary);
      background: var(--hover)
    }

    .dest-tile.selected::after {
      content: "";
      position: absolute;
      top: 11px;
      right: 11px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--primary);
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'><path d='M3 6.5 L5 8.5 L9 4' fill='none' stroke='white' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'/></svg>");
      background-size: 16px;
      background-repeat: no-repeat;
      background-position: center
    }

    .dest-tile.retailer.selected {
      border-color: #E31837;
      background: rgba(227, 24, 55, 0.05)
    }

    .dest-tile.retailer.selected::after {
      background: #E31837
    }

    .dest-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--t1);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 7px
    }

    .dest-kind {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--t3);
      background: var(--el);
      padding: 2px 6px;
      border-radius: 5px
    }

    .dest-reach {
      font-size: 11.5px;
      color: var(--t3)
    }

    /* lift study */
    .lift-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 10px 0 4px
    }

    .lift-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 13px;
      padding: 15px 17px
    }

    .lift-label {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 7px
    }

    .lift-value {
      font-size: 26px;
      font-weight: 700;
      color: var(--green);
      letter-spacing: -0.02em;
      line-height: 1.05;
      display: flex;
      align-items: baseline;
      gap: 4px
    }

    .lift-value small {
      font-size: 13px;
      font-weight: 600;
      color: var(--t3)
    }

    .lift-sub {
      font-size: 11px;
      color: var(--t3);
      margin-top: 4px
    }

    .lift-loop {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--green-bg);
      border-radius: 10px;
      padding: 12px 15px;
      margin-top: 14px;
      font-size: 12.5px;
      color: #0a7320
    }

    [data-theme="dark"] .lift-loop {
      color: #7CD893
    }

    .lift-loop svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0
    }

    /* ===== Demographic profile (ported) ===== */
    .interp-line {
      background: var(--up-bg);
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 13px;
      color: var(--t1);
      margin: 8px 0 18px;
      line-height: 1.55;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      border-left: 3px solid var(--up)
    }

    .interp-icon {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      background: var(--up);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 700
    }

    .stat-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 11px;
      margin: 0 0 4px
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      overflow: hidden
    }

    .stat-card-glyph {
      position: absolute;
      right: -6px;
      top: -6px;
      width: 52px;
      height: 52px;
      opacity: .10;
      color: var(--activate);
      pointer-events: none
    }

    .stat-card-glyph svg {
      width: 100%;
      height: 100%
    }

    .stat-card-label {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--t3)
    }

    .stat-card-num {
      font-size: 28px;
      font-weight: 700;
      color: var(--t1);
      letter-spacing: -0.02em;
      line-height: 1;
      display: flex;
      align-items: baseline;
      gap: 4px
    }

    .stat-card-num small {
      font-size: 13px;
      font-weight: 500;
      color: var(--t3);
      letter-spacing: 0
    }

    .stat-card-sub {
      font-size: 11px;
      color: var(--t3);
      display: flex;
      align-items: center;
      gap: 6px
    }

    .stat-card-pill {
      font-size: 10px;
      font-weight: 700;
      background: rgba(255, 111, 0, 0.12);
      color: var(--activate);
      padding: 2px 7px;
      border-radius: 8px
    }

    .dp-section {
      padding: 18px 0;
      border-bottom: 1px solid var(--border)
    }

    .dp-section:last-of-type {
      border-bottom: none
    }

    .dp-section:first-of-type {
      padding-top: 8px
    }

    .dp-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--t1);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .dp-title small {
      font-size: 11px;
      color: var(--t3);
      font-weight: 400
    }

    .dp-bar-idx {
      font-size: 10px;
      font-weight: 700;
      color: var(--activate);
      background: rgba(255, 111, 0, 0.12);
      padding: 1px 6px;
      border-radius: 8px;
      display: inline-block
    }

    .age-curve-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px 12px
    }

    .age-curve-wrap svg {
      width: 100%;
      height: auto;
      display: block
    }

    .age-legend {
      display: flex;
      gap: 18px;
      font-size: 11px;
      color: var(--t3);
      margin-top: 4px;
      padding-left: 6px
    }

    .age-leg {
      display: flex;
      align-items: center;
      gap: 7px
    }

    .age-leg-swatch {
      width: 18px;
      height: 3px;
      border-radius: 2px;
      background: var(--activate)
    }

    .age-leg-swatch.dashed {
      background: transparent;
      border-top: 1.5px dashed var(--bh);
      height: 0
    }

    .age-dot-g {
      cursor: pointer
    }

    .age-dot-g .age-dot-visible {
      transition: r .15s, stroke-width .15s
    }

    .age-dot-g:hover .age-dot-visible {
      r: 5.5;
      stroke-width: 2.5
    }

    .income-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px 16px
    }

    .income-axis {
      display: grid;
      grid-template-columns: 96px 1fr 60px 54px;
      gap: 12px;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 12px
    }

    .income-axis .axis-track {
      display: flex;
      justify-content: space-between;
      align-items: center
    }

    .income-axis .axis-mid {
      color: var(--t3);
      font-weight: 600
    }

    .income-divrows {
      display: flex;
      flex-direction: column;
      gap: 6px
    }

    .income-drow {
      display: grid;
      grid-template-columns: 96px 1fr 60px 54px;
      align-items: center;
      gap: 12px;
      font-size: 11.5px;
      border-radius: 6px;
      padding: 2px 6px;
      margin: 0 -6px;
      cursor: pointer;
      transition: background .15s
    }

    .income-drow:hover {
      background: var(--hover)
    }

    .income-drow-label {
      color: var(--t1);
      font-weight: 500
    }

    .income-dtrack {
      position: relative;
      height: 24px;
      border-radius: 6px;
      background: var(--el)
    }

    .income-dtrack::after {
      content: "";
      position: absolute;
      top: -4px;
      bottom: -4px;
      left: 50%;
      width: 1px;
      background: var(--bh)
    }

    .income-dfill {
      position: absolute;
      top: 0;
      bottom: 0;
      border-radius: 5px;
      display: flex;
      align-items: center;
      font-size: 10.5px;
      font-weight: 700;
      color: #fff;
      padding: 0 8px;
      transition: width .8s ease
    }

    .income-dfill.under {
      background: var(--bh);
      right: 50%;
      justify-content: flex-end
    }

    .income-dfill.over {
      background: var(--activate);
      left: 50%;
      justify-content: flex-start
    }

    .income-drow-val {
      color: var(--t2);
      font-size: 11.5px;
      text-align: right;
      font-weight: 500
    }

    .income-didx {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 8px;
      text-align: center
    }

    .income-didx.over {
      background: rgba(255, 111, 0, 0.12);
      color: var(--activate)
    }

    .income-didx.under {
      background: var(--el);
      color: var(--t3)
    }

    .geo-wrap {
      display: grid;
      grid-template-columns: 1.45fr 1fr;
      gap: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px
    }

    .geo-map {
      position: relative
    }

    .geo-map svg {
      width: 100%;
      height: auto;
      display: block
    }

    .geo-state {
      cursor: pointer
    }

    .geo-state-rect {
      transition: transform .15s, filter .15s;
      transform-origin: center;
      transform-box: fill-box
    }

    .geo-state:hover .geo-state-rect {
      filter: brightness(1.08);
      transform: scale(1.06)
    }

    .geo-state-abbr {
      font-size: 8.5px;
      font-weight: 700;
      pointer-events: none;
      letter-spacing: 0.02em;
      font-family: 'proxima-nova', sans-serif
    }

    .geo-state-dot {
      pointer-events: none
    }

    .geo-legend-stops {
      display: flex;
      height: 7px;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 12px
    }

    .geo-legend-stops div {
      flex: 1
    }

    .geo-legend-labels {
      display: flex;
      justify-content: space-between;
      font-size: 9.5px;
      color: var(--t3);
      margin-top: 5px;
      letter-spacing: 0.04em
    }

    .geo-dmas {
      display: flex;
      flex-direction: column;
      gap: 0
    }

    .geo-dmas-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 6px
    }

    .geo-dma-row {
      display: grid;
      grid-template-columns: 14px 1fr auto auto;
      gap: 10px;
      align-items: center;
      font-size: 11.5px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border)
    }

    .geo-dma-row:last-child {
      border-bottom: none
    }

    .geo-dma-marker {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--activate);
      box-shadow: 0 0 0 3px rgba(255, 111, 0, 0.18)
    }

    .geo-dma-name {
      color: var(--t1)
    }

    .geo-dma-reach {
      color: var(--t3);
      font-size: 10.5px;
      margin-right: 6px
    }

    .hh-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px
    }

    .hh-types {
      display: flex;
      flex-direction: column;
      gap: 11px
    }

    .hh-type-row {
      display: grid;
      grid-template-columns: 200px 1fr 50px 60px;
      gap: 14px;
      align-items: center;
      border-radius: 6px;
      padding: 3px 6px;
      margin: 0 -6px;
      cursor: pointer;
      transition: background .15s
    }

    .hh-type-row:hover {
      background: var(--hover)
    }

    .hh-people-cell {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .hh-people {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 30px;
      width: 74px;
      flex-shrink: 0
    }

    .hh-person {
      display: flex;
      flex-direction: column;
      align-items: center
    }

    .hh-person-head {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--up);
      margin-bottom: 1px
    }

    .hh-person-body {
      width: 11px;
      height: 14px;
      background: var(--up);
      border-radius: 3px 3px 1px 1px
    }

    .hh-person.kid .hh-person-head {
      width: 6px;
      height: 6px;
      background: var(--secondary)
    }

    .hh-person.kid .hh-person-body {
      width: 8px;
      height: 10px;
      background: var(--secondary)
    }

    .hh-type-name {
      font-size: 11.5px;
      color: var(--t1);
      font-weight: 500
    }

    .hh-type-bar {
      height: 14px;
      background: var(--el);
      border-radius: 3px;
      position: relative;
      overflow: hidden
    }

    .hh-type-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      background: var(--up);
      border-radius: 3px;
      transition: width .8s ease
    }

    .hh-type-fill.featured {
      background: var(--activate)
    }

    .hh-type-pct {
      font-size: 13px;
      font-weight: 600;
      color: var(--t1);
      text-align: right
    }

    .hh-type-idx {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 8px;
      text-align: center
    }

    .hh-type-idx.over {
      background: rgba(255, 111, 0, 0.12);
      color: var(--activate)
    }

    .hh-type-idx.neutral {
      background: var(--el);
      color: var(--t3)
    }

    .gen-rail {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--border)
    }

    .gen-rail-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 10px
    }

    .gen-bar {
      display: flex;
      height: 34px;
      border-radius: 8px;
      overflow: hidden;
      gap: 2px
    }

    .gen-seg {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      position: relative;
      line-height: 1.15;
      padding: 0 6px;
      cursor: pointer;
      transition: filter .15s
    }

    .gen-seg:hover {
      filter: brightness(1.08)
    }

    .gen-seg small {
      font-size: 9px;
      font-weight: 600;
      opacity: 0.85
    }

    .gen-seg.featured {
      outline: 2px solid var(--activate);
      outline-offset: 2px;
      border-radius: 4px;
      z-index: 2
    }

    .gen-legend {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--t3);
      margin-top: 14px;
      letter-spacing: 0.02em
    }

    .gen-legend span {
      flex: 1;
      text-align: center
    }

    .gen-legend span.lead {
      color: var(--activate);
      font-weight: 700
    }

    /* streaming reveal */
    .stream-block {
      opacity: 0;
      transform: translateY(8px);
      max-height: 0;
      overflow: hidden;
      transition: opacity .45s, transform .45s, max-height .55s ease
    }

    .stream-block.in {
      opacity: 1;
      transform: translateY(0);
      max-height: 1600px
    }

    .stream-stagger {
      opacity: 0;
      transform: translateY(6px);
      transition: opacity .35s, transform .35s
    }

    .stream-stagger.in {
      opacity: 1;
      transform: translateY(0)
    }

    .stream-tile {
      opacity: 0;
      transition: opacity .28s
    }

    .stream-tile.in {
      opacity: 1
    }

    .stream-fill-area {
      opacity: 0;
      transition: opacity .6s
    }

    .stream-fill-area.in {
      opacity: 1
    }

    .stream-late {
      opacity: 0;
      transition: opacity .5s
    }

    .stream-late.in {
      opacity: 1
    }

    /* tooltip */
    .dp-tooltip {
      position: fixed;
      background: var(--t1);
      color: var(--surface);
      padding: 8px 12px;
      border-radius: 7px;
      font-size: 11px;
      line-height: 1.5;
      pointer-events: none;
      opacity: 0;
      transform: translateY(3px);
      transition: opacity .12s, transform .12s;
      z-index: 2000;
      max-width: 240px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.22)
    }

    [data-theme="dark"] .dp-tooltip {
      background: #000
    }

    .dp-tooltip.show {
      opacity: 1;
      transform: translateY(0)
    }

    .dp-tt-title {
      font-weight: 700;
      font-size: 11.5px;
      margin-bottom: 3px;
      letter-spacing: -0.01em
    }

    .dp-tt-body {
      opacity: 0.86
    }

    .dp-tt-body b {
      font-weight: 700;
      opacity: 1;
      color: #FFB37A
    }

    /* composer (docked) */
    .composer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(to top, var(--bg) 62%, transparent);
      padding: 16px 36px 24px;
      pointer-events: none
    }

    .composer-inner {
      max-width: 1000px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px 16px 9px;
      box-shadow: var(--sh-md);
      pointer-events: auto
    }

    .composer-input {
      font-size: 14px;
      color: var(--t3);
      padding: 7px 4px 9px;
      min-height: 26px;
      outline: none
    }

    .composer-input[contenteditable]:empty::before {
      content: attr(data-placeholder);
      color: var(--t3)
    }

    .composer-input[contenteditable] {
      color: var(--t1)
    }

    .composer-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 5px
    }

    .composer-plus {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      color: var(--t3);
      display: flex;
      align-items: center;
      justify-content: center
    }

    .composer-plus svg {
      width: 19px;
      height: 19px
    }

    .composer-plus:hover {
      background: var(--el);
      color: var(--t2)
    }

    .composer-plus:hover {
      background: var(--el)
    }

    .composer-right {
      display: flex;
      align-items: center;
      gap: 12px
    }

    .composer-model {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12.5px;
      color: var(--t2)
    }

    .composer-model::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--up)
    }

    .composer-mic {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      color: var(--t3);
      display: flex;
      align-items: center;
      justify-content: center
    }

    .composer-mic svg {
      width: 20.16px;
      height: 20.16px
    }

    .composer-send {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: var(--primary);
      color: #fff;
      display: none;
      align-items: center;
      justify-content: center
    }

    .composer-send.show {
      display: flex
    }

    .composer-send:hover {
      background: var(--primary-dark)
    }

    .composer-send svg {
      width: 16px;
      height: 16px
    }

    .composer.hidden {
      display: none
    }

    /* context menu */
    .ctx-menu {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--sh-lg);
      padding: 8px;
      min-width: 210px;
      z-index: 1000;
      display: none
    }

    .ctx-menu.open {
      display: block
    }

    .ctx-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 13.5px;
      color: var(--t1);
      cursor: pointer;
      white-space: nowrap
    }

    .ctx-item:hover {
      background: var(--el)
    }

    .ctx-item svg {
      width: 17px;
      height: 17px;
      color: var(--t3)
    }

    .ctx-item .chev {
      margin-left: auto;
      color: var(--t4)
    }

    .ctx-item.danger {
      color: var(--red)
    }

    .ctx-item.danger svg {
      color: var(--red)
    }

    .ctx-sep {
      height: 1px;
      background: var(--border);
      margin: 6px 4px
    }

    /* settings overlay + theme switch */
    .settings-pop {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--sh-lg);
      padding: 8px;
      min-width: 210px;
      z-index: 1000;
      display: none
    }

    .settings-pop.open {
      display: block
    }

    .settings-pop-title {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--t3);
      padding: 6px 10px 5px
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 9px 10px;
      border-radius: 8px;
      font-size: 13.5px;
      color: var(--t1);
      cursor: pointer
    }

    .settings-row:hover {
      background: var(--el)
    }

    .switch {
      width: 38px;
      height: 22px;
      border-radius: 11px;
      background: var(--bm);
      position: relative;
      transition: background .18s;
      flex-shrink: 0
    }

    .switch.on {
      background: var(--primary)
    }

    .switch .knob {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      transition: transform .18s;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3)
    }

    .switch.on .knob {
      transform: translateX(16px)
    }

    /* + composer menu */
    .plus-menu {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--sh-lg);
      padding: 7px;
      min-width: 206px;
      z-index: 1100;
      display: none
    }

    .plus-menu.open {
      display: block
    }

    .plus-item {
      position: relative;
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 9px 11px;
      border-radius: 8px;
      font-size: 13.5px;
      color: var(--t1);
      cursor: pointer
    }

    .plus-item:hover {
      background: var(--el)
    }

    .plus-item svg {
      width: 17px;
      height: 17px;
      color: var(--t3);
      flex-shrink: 0
    }

    .plus-item .chev {
      margin-left: auto;
      color: var(--t4);
      font-size: 15px;
      line-height: 1
    }

    .plus-sub {
      position: absolute;
      left: 100%;
      bottom: -7px;
      margin-left: 5px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--sh-lg);
      padding: 7px;
      min-width: 178px;
      max-height: 70vh;
      overflow: auto;
      display: none
    }

    .plus-sub::before {
      content: "";
      position: absolute;
      left: -10px;
      top: 0;
      width: 10px;
      height: 100%
    }

    .plus-item.has-sub:hover .plus-sub {
      display: block
    }

    .plus-subitem {
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 13.5px;
      color: var(--t1);
      cursor: pointer;
      white-space: nowrap
    }

    .plus-subitem:hover {
      background: var(--el)
    }

    .spacer {
      flex: 1
    }

    /* ============ PILOT DEMO — cross-solution flow ============ */
    .phase-plan {
      display: flex;
      flex-direction: column;
      margin-top: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden
    }

    .phase-row {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border)
    }

    .phase-row:last-child {
      border-bottom: none
    }

    .phase-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--el);
      color: var(--t2);
      font-size: 11.5px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0
    }

    .phase-row.live .phase-num {
      background: var(--primary);
      color: #fff
    }

    .phase-row.held .phase-num {
      background: var(--amber-bg);
      color: #a86518
    }

    .phase-main {
      flex: 1;
      min-width: 0
    }

    .phase-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--t1)
    }

    .phase-sub {
      font-size: 11.5px;
      color: var(--t3)
    }

    /* flat variant — lives inside the planning block, on the gray background */
    .phase-plan.flat {
      border: none;
      border-radius: 0;
      background: none;
      overflow: visible;
      margin: 0 0 6px
    }

    .phase-plan.flat .phase-row {
      background: transparent;
      border-bottom: none;
      padding: 7px 0;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity .3s, transform .3s
    }

    .phase-plan.flat .phase-row.in {
      opacity: 1;
      transform: translateY(0)
    }

    .pa-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12.5px;
      margin-top: 4px
    }

    .pa-table th {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--t3);
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap
    }

    .pa-table th.num,
    .pa-table td.num {
      text-align: right
    }

    .pa-table td {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      color: var(--t1);
      white-space: nowrap
    }

    .pa-table tbody tr {
      cursor: pointer;
      transition: background .12s
    }

    .pa-table tbody tr:hover {
      background: var(--hover)
    }

    .pa-table tbody tr:last-child td {
      border-bottom: none
    }

    .pa-table tbody tr.top td {
      background: rgba(74, 144, 226, 0.05)
    }

    .pa-table tbody tr.selected td {
      background: rgba(0, 185, 41, 0.07)
    }

    .pa-rank {
      display: inline-flex;
      width: 21px;
      height: 21px;
      border-radius: 50%;
      background: var(--el);
      color: var(--t2);
      font-size: 10.5px;
      font-weight: 700;
      align-items: center;
      justify-content: center
    }

    .pa-table tr.top .pa-rank {
      background: var(--primary);
      color: #fff
    }

    .pa-prod {
      font-weight: 600
    }

    .pa-neg {
      color: var(--red);
      font-weight: 600
    }

    .pa-pos {
      color: var(--secondary-dark);
      font-weight: 600
    }

    [data-theme="dark"] .pa-pos {
      color: var(--secondary)
    }

    .chain {
      display: flex;
      align-items: stretch;
      margin: 14px 0 2px;
      flex-wrap: wrap;
      row-gap: 10px
    }

    .chain-step {
      flex: 1;
      min-width: 158px;
      background: rgba(255, 255, 255, 0.35);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      opacity: .45;
      transition: opacity .3s, border-color .3s
    }

    [data-theme="dark"] .chain-step {
      background: rgba(21, 27, 34, 0.35)
    }

    .chain-step.on {
      opacity: 1;
      border-color: var(--primary)
    }

    .chain-step.ok {
      opacity: 1;
      border-color: var(--green)
    }

    .chain-arrow {
      display: flex;
      align-items: center;
      padding: 0 7px;
      color: var(--t4);
      flex-shrink: 0
    }

    .chain-arrow svg {
      width: 15px;
      height: 15px
    }

    .chain-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px
    }

    .chain-name {
      font-size: 12.5px;
      font-weight: 700;
      color: var(--t1)
    }

    .chain-sub {
      font-size: 11px;
      color: var(--t3);
      min-height: 15px
    }

    .chain-id {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 10px;
      color: var(--primary);
      margin-top: 8px;
      min-height: 13px;
      word-break: break-all
    }

    .chain-step.ok .chain-id {
      color: var(--green)
    }

    .chain-spin {
      display: inline-block;
      width: 11px;
      height: 11px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: chsp .7s linear infinite;
      vertical-align: -1px;
      margin-right: 5px
    }

    @keyframes chsp {
      to {
        transform: rotate(360deg)
      }
    }
  </style>
</head>

<body>

  <!-- ============ TOPBAR ============ -->
  <!-- ============ SHELL ============ -->
  <div class="shell">
    <button class="drawer-expander" onclick="toggleDrawer()" title="Conversation history"><svg viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">

          <div class="drawer-tab" data-tab="projects" onclick="switchDrawerTab('projects')">Projects</div>

      <div class="composer hidden" id="composer">

          <div class="composer-input" id="composerInput" contenteditable="true"

          <div class="composer-footer">
            <button class="composer-plus" onclick="togglePlusMenu(event)"><svg viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M12 5v14M5 12h14" />
              </svg></button>
            <div class="composer-right">
              <button class="composer-mic" title="Voice"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"

              <button class="composer-send" id="composerSend" onclick="submitComposer()" title="Send"><svg
                  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round">
                  <path
                    d="M14.536 21.686a.5.5 0 0 0 .937-.024l6.5-19a.496.496 0 0 0-.635-.635l-19 6.5a.5.5 0 0 0-.024.937l7.93 3.18a2 2 0 0 1 1.112 1.11z" />
                  <path d="m21.854 2.147-10.94 10.939" />

            </div>
          </div>
        </div>
      </div>
    </main>

    <div class="pane-resizer" id="paneResizer" onmousedown="startResize(event)"></div>

  </div>

  <!-- settings overlay -->
  <div class="settings-pop" id="settingsPop">
    <div class="settings-pop-title">Appearance</div>

      <span>Dark mode</span>

  <script>

    let A = null;            // current audience
    let firstTurn = false;   // has the conversation started
    let pilot = null;        // pilot-demo flow state {checkpoint, selected}
    let destDraft = null;    // working copy while editing destinations

    function newAudience() {
      return {

    function parseIntent(t) {
      const s = t.toLowerCase();
      if (/across my portfolio|buyer attrition|attrition|lost households|price increases/.test(s) && !A) return { kind: 'pilot' };
      if (/^i want an audience of soda|quick start/.test(s)) return { kind: 'vague' };
      if (/lapsed|diet pepsi|build|switch|sparkling|create an audience/.test(s) && !A) return { kind: 'primary' };
      if (/26|widen|window|prior/.test(s)) return { kind: 'widen' };
      if (/profile/.test(s)) return { kind: 'profile' };
      if (/scale|proscore|expand|kids|children/.test(s)) return { kind: 'scale' };
      if (/estimate|size/.test(s)) return { kind: 'estimate' };
      if (/destination|tiktok|liveramp|meta|costco/.test(s)) return { kind: 'dest' };
      if (/activate/.test(s)) return { kind: 'activate' };
      if (/lift|measure/.test(s)) return { kind: 'lift' };
      if (/definition|increaser|loyal/.test(s)) return { kind: 'editType' };
      return { kind: 'generic' };

      // Pilot checkpoint: phase 2 is held — typed text resolves the product selection
      if (pilot && pilot.checkpoint) {
        const sel = pilotMatchSelection(t);
        if (sel != null) { pilotSelect(sel, t); return; }
      }
      const it = parseIntent(t);
      if (!A && it.kind === 'pilot') { startConversation(t, 'pilot'); return; }
      if (!A && (it.kind === 'primary' || it.kind === 'generic')) { startConversation(t, 'primary'); return; }
      if (!A && it.kind === 'vague') { startConversation(t, 'vague'); return; }

    /* ============================================================

    function statusMeta() {
      switch (A.status) {
        case 'incomplete': return { cls: 'incomplete', label: 'Incomplete' };
        case 'built': return { cls: 'built', label: 'Built · verified seed' };
        case 'scaled': return { cls: 'scaled', label: 'Scaled · Complete' };
        case 'ready': return { cls: 'ready', label: 'Ready · gates passed' };
        case 'activated': return { cls: 'activated', label: 'Activated' };
        default: return { cls: 'built', label: 'Built' };
      }
    }
    function esc(s) { return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }
    function addBtn(onclick, danger) { return `<button class="pill pill-add${danger ? ' danger' : ''}" title="Add" onclick="${onclick}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>`; }
    function pill(cls, text, prefill, remove, clickAction) {
      const x = remove ? `<span class="pill-x" title="Remove" onclick="event.stopPropagation();${remove}">×</span>` : '';
      const onclick = clickAction ? clickAction : `prefillComposer('${prefill.replace(/'/g, "\\'")}')`;
      return `<span class="pill ${cls}" onclick="${onclick}">${text}${x}</span>`;
    }
    function removePill(xEl, kind, val) {
      const labels = { product: 'the product scope', time: 'the time period', measure: 'measure “' + val + '”', attribute: 'attribute “' + val + '”', dest: 'destination “' + val + '”' };
      if (kind === 'product') A.product = null;
      else if (kind === 'time') { A.time = null; }
      else if (kind === 'measure') { const i = A.measures.indexOf(val); if (i >= 0) A.measures.splice(i, 1); }
      else if (kind === 'attribute') { const i = A.attributes.indexOf(val); if (i >= 0) A.attributes.splice(i, 1); }
      else if (kind === 'dest') { const i = A.destinations.indexOf(val); if (i >= 0) A.destinations.splice(i, 1); }
      A.version++;
      if (pinned) {
        addUserMsg('Remove ' + labels[kind]);
        agentNote('Removed <b>' + (val || (kind === 'product' ? 'product scope' : 'time period')) + '</b>. Updated the pinned definition.');
        syncPanel();
        return;
      }
      // unpinned: re-render this tile in place so empty critical rows show the red +
      // and the next-step chips (Estimate size / Activate) reflect the updated state
      const wrap = xEl.closest('.msg-agent');
      if (wrap) wrap.innerHTML = tileMessageHTML(false);
      else { const p = xEl.closest('.pill'); if (p) p.remove(); }
    }
    function typePillText() { return `${A.type} · ${A.definition}`; }

    function tileMessageHTML(collapsed) {
      return `${tileHTML(collapsed)}
    <div class="followup-section">
      <div class="followup-label">Recommended next steps</div>
      <div class="chip-row">${chipsFor(A.status, true)}</div>
    </div>`;
    }
    /* When pinned, the definition card lives in the right panel; renderTile refreshes
       it there. When unpinned, it renders inline in the thread (tile + chips) as before. */
    function renderTile(collapsed) {
      if (pinned) { syncPanel(); return; }

      const wrap = el('div', 'msg-agent');
      wrap.innerHTML = tileMessageHTML(collapsed);
      appendMessage(wrap);
      maybeShowPinCoach();

    /* After a builder commit (measure/type/destinations): inline tile+chips when
       unpinned; when pinned, refresh the panel and post next steps in the chat. */
    function afterEdit() { if (pinned) appendNextSteps(); else renderTile(); }
    /* Used by build/re-resolve: definition either inline (with chips) or panel + chips-in-thread */
    function renderDefinitionAndSteps() {

      else renderTile();

    /* Render the definition card into the right panel (KPI strip on top once sized) */
    function syncPanel() {
